<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro - Stable Hybrid</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #007bff; --bg: #000; --card: #1a1a1a; --text: #f5f5f5; }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* Background Clock */
        .clock-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 0; overflow: hidden; display: block; }
        .clock-face { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 130vw; height: 130vw; max-width: 800px; max-height: 800px; opacity: 0.5; }
        .clock-number { position: absolute; width: 100%; height: 100%; text-align: center; font-size: 35px; color: rgba(255,255,255,0.2); padding: 20px; box-sizing: border-box; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; border-radius: 10px; }
        .hour { width: 8px; height: 25%; background: #fff; }
        .minute { width: 5px; height: 35%; background: #ddd; }
        .second { width: 2px; height: 40%; background: #ff4444; }
        .center-dot { position: absolute; width: 12px; height: 12px; background: #ff4444; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* Welcome Text */
        .welcome-badge { position: absolute; top: 10%; width: 100%; text-align: center; font-size: 50px; font-weight: bold; color: #fff; z-index: 10; }

        /* Pages & UI */
        .page { display: none; padding: 20px; position: relative; z-index: 10; min-height: 100vh; box-sizing: border-box; }
        .page.active { display: block; }
        
        .login-container { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 80vh; max-width: 350px; margin: auto; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.1); border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 18px; box-sizing: border-box; outline: none; }
        
        .btn { background: var(--primary); color: #fff; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 20px; cursor: pointer; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #333; margin-top: 20px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #333; background: #111; margin-bottom: 5px; border-radius: 10px; }

        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: none; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-item { color: #555; text-align: center; flex: 1; font-size: 14px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="clock-bg" id="main-clock">
        <div class="clock-face" id="clock-face">
            <div class="hand hour" id="hour-hand"></div>
            <div class="hand minute" id="min-hand"></div>
            <div class="hand second" id="sec-hand"></div>
            <div class="center-dot"></div>
        </div>
    </div>

    <div id="p-auth" class="page active">
        <div class="welcome-badge">Welcome</div>
        <div class="login-container">
            <div style="height: 100px;"></div>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="authAction()">Sign In</button>
            <p onclick="toggleAuth()" id="toggle-text" style="text-decoration: underline; color: #888; margin-top: 20px; cursor: pointer;">Create Account</p>
        </div>
    </div>

    <div id="p-add" class="page" style="overflow-y: auto;">
        <div class="card" style="margin-top: 50px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="color: var(--primary); margin: 0;">Add Work</h2>
                <button onclick="logout()" style="background: none; border: 1px solid #444; color: #888; padding: 5px 10px; border-radius: 8px;">Logout</button>
            </div>
            <input type="text" id="u-name" placeholder="Full Name">
            <input type="text" id="u-comp" placeholder="Company Name">
            <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
            <input type="date" id="w-date">
            <input type="number" id="w-hrs" placeholder="Hours (e.g. 8)">
            <textarea id="w-note" placeholder="Note (Optional)"></textarea>
            <button class="btn" onclick="saveData()">SAVE ✅</button>
        </div>
    </div>

    <div id="p-rep" class="page" style="overflow-y: auto; padding-bottom: 100px;">
        <div class="card" style="margin-top: 50px;">
            <h3>Work Report</h3>
            <input type="month" id="month-filter" onchange="filterLogs()">
            <div id="list-container"></div>
            <div style="text-align: center; padding: 20px; border-top: 1px solid #333; margin-top: 15px;">
                TOTAL: <b id="r-total" style="font-size: 35px; color: var(--primary);">0.0</b> Hrs
            </div>
            <button class="btn" onclick="sharePDF()">Share PDF <i class="fas fa-share-nodes"></i></button>
        </div>
    </div>

    <nav id="nav" class="nav">
        <div class="nav-item active" id="t-add" onclick="tab('add')"><i class="fas fa-plus"></i><br>Add</div>
        <div class="nav-item" id="t-rep" onclick="tab('rep')"><i class="fas fa-file-lines"></i><br>Report</div>
    </nav>
