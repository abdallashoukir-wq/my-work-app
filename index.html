<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro - Corporate Edition</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        /* 🎨 تناسق الألوان: Corporate Blue & Dark Theme */
        :root { --primary: #007bff; /* أزرق احترافي */ --bg: #0d0d0d; --card: #1a1a1a; --text: #f5f5f5; --accent: #00e676; --danger: #ff4444; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; font-size: 18px; }
        
        .page { display: none; padding: 20px; box-sizing: border-box; min-height: 100vh; }
        .page.active { display: block; }

        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; max-width: 450px; margin: auto; }
        
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #222; border: 2px solid #333; color: white; border-radius: 12px; font-size: 18px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }

        .btn { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 20px; margin-top: 10px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn:active { transform: scale(0.98); }

        /* التقرير الداكن (المكبر) في الموبايل */
        #list-container { margin-top: 15px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #333; background: #111; margin-bottom: 8px; border-radius: 12px; font-size: 20px; }
        .item-actions { display: flex; gap: 12px; }
        .icon-btn { background: none; border: none; font-size: 22px; cursor: pointer; }

        .total-box { text-align: center; padding: 20px; background: rgba(0, 123, 255, 0.1); border: 1px solid var(--primary); border-radius: 15px; margin-top: 25px; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: none; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; backdrop-filter: blur(10px); z-index: 1000; }
        .nav-item { color: #666; text-align: center; flex: 1; font-size: 16px; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

<div id="p-auth" class="page active">
    <div class="card" style="margin-top: 60px; text-align: center;">
        <i class="fas fa-user-tie" style="font-size: 3.5rem; color: var(--primary); margin-bottom: 20px;"></i>
        <h2>Corporate Login</h2>
        <input type="email" id="email" placeholder="Work Email">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="authAction()">Sign In <i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<div id="p-add" class="page">
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0; color:var(--primary);">Log Time</h3>
            <button onclick="logout()" style="background:none; border:1px solid #444; color:#888; padding:5px 10px; border-radius:8px; cursor:pointer;">Logout</button>
        </div>
        <input type="text" id="u-name" placeholder="Full Name (for Report)">
        <input type="text" id="u-comp" placeholder="Company Name (for Report)">
        <hr style="border:0; border-top:1px solid #333; margin:15px 0">
        <input type="date" id="w-date">
        <input type="number" step="0.5" id="w-hrs" placeholder="Hours Worked (e.g. 8.5)">
        <textarea id="w-note" placeholder="Short Note... (Optional)" rows="2"></textarea>
        <button class="btn" id="s-btn" onclick="saveData()">SAVE WORK ✅</button>
    </div>
</div>

<div id="p-rep" class="page" style="padding-bottom: 100px;">
    <div class="card">
        <h3>Time Summary</h3>
        <p style="font-size:16px; color:#888;">Name: <span id="res-name" style="color:var(--text)">---</span></p>
        <p style="font-size:16px; color:#888;">Company: <span id="res-comp" style="color:var(--text)">---</span></p>
        <label style="font-size:14px; color:#888;">Month Filter:</label>
        <input type="month" id="month-filter" onchange="filterLogs()">
        
        <div id="list-container"></div>
        
        <div class="total-box">
            <span>TOTALE ORE:</span><br>
            <b style="font-size:35px; color:var(--primary);" id="r-total">0.0</b>
        </div>
    </div>
    <button class="btn" style="background:var(--primary); color:white; margin-top:20px;" onclick="handleiOSSharePDF()">Export Professional PDF <i class="fas fa-share-alt"></i></button>
</div>

<nav id="nav" class="nav">
    <div class="nav-item active" id="t-add" onclick="tab('add')"><i class="fas fa-plus"></i><br>Add</div>
    <div class="nav-item" id="t-rep" onclick="tab('rep')"><i class="fas fa-file-invoice"></i><br>Report</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, orderBy, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById('month-filter').value = new Date().toISOString().slice(0, 7);

    window.authAction = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch { try { await createUserWithEmailAndPassword(auth, e, p); } catch(err){ alert(err.message); } }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-add').classList.add('active');
            document.getElementById('nav').style.display = 'flex';
            const uSnap = await getDoc(doc(db, "users", user.uid));
            if(uSnap.exists()) {
                const name = uSnap.data().fullname || "User";
                const comp = uSnap.data().company || "";
                document.getElementById('u-name').value = name;
                document.getElementById('u-comp').value = comp;
                document.getElementById('res-name').innerText = name;
                document.getElementById('res-comp').innerText = comp;
            }
            filterLogs(); 
        } else {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-auth').classList.add('active');
            document.getElementById('nav').style.display = 'none';
        }
    });

    window.tab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-' + t).classList.add('active');
        document.getElementById('t-' + t).classList.add('active');
    };

    window.saveData = async () => {
        const n = document.getElementById('u-name').value, c = document.getElementById('u-comp').value, d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!n || !d || !h) return alert("Fill Name, Date and Hours!");
        const btn = document.getElementById('s-btn'); btn.disabled = true;
        try {
            await setDoc(doc(db, "users", auth.currentUser.uid), { fullname: n, company: c }, { merge: true });
            const docId = `${auth.currentUser.uid}_${d}`; 
            await setDoc(doc(db, "workLogs", docId), {
                uid: auth.currentUser.uid,
                fullname: n, company: c, date: d, hours: parseFloat(h), note: document.getElementById('w-note').value, month: d.slice(0, 7)
            });
            alert("Saved! ✅"); document.getElementById('w-hrs').value = ""; document.getElementById('w-note').value = ""; tab('rep');
        } catch (e) { alert(e.message); }
        btn.disabled = false;
    };

    window.deleteLog = async (id) => { if(confirm("Delete this?")) await deleteDoc(doc(db, "workLogs", id)); };
    window.editLog = (d, h, n) => { document.getElementById('w-date').value = d; document.getElementById('w-hrs').value = h; document.getElementById('w-note').value = n; tab('add'); };

    let currentLogData = []; 
    window.filterLogs = () => {
        const month = document.getElementById('month-filter').value;
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), where("month", "==", month));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('list-container'); list.innerHTML = ""; let total = 0; currentLogData = [];
            snap.forEach(d => {
                const data = d.data(); total += data.hours;
                const dateParts = data.date.split('-');
                const formattedDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
                // حساب النسبة من يوم كامل (8 ساعات)
                const percent = (data.hours / 8) * 100;
                currentLogData.push([formattedDate, data.hours.toFixed(1), `${percent.toFixed(0)}%`]);
                
                list.innerHTML += `
                    <div class="item-row">
                        <div><b>${data.date}</b><br><small>${data.hours} hrs</small></div>
                        <div class="item-actions">
                            <button class="icon-btn" onclick="editLog('${data.date}', ${data.hours}, '${data.note || ''}')"><i class="fas fa-edit" style="color:var(--primary)"></i></button>
                            <button class="icon-btn" onclick="deleteLog('${d.id}')"><i class="fas fa-trash" style="color:var(--danger)"></i></button>
                        </div>
                    </div>`;
            });
            document.getElementById('r-total').innerText = total.toFixed(1);
        });
    }

    // ✅ تصدير PDF احترافي، لمنظم، ومضغوط (One Page A4)
    window.handleiOSSharePDF = async () => {
        const name = document.getElementById('res-name').innerText;
        const comp = document.getElementById('res-comp').innerText;
        const month = document.getElementById('month-filter').value;
        const total = document.getElementById('r-total').innerText;

        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();

        // 1. PDF Header (Corporate Branding)
        docPDF.setFontSize(22);
        docPDF.setTextColor(0, 123, 255); // Professional Blue
        docPDF.text(`${comp || "WorkTime Pro"} - Work Report`, 105, 20, null, null, "center");

        docPDF.setFontSize(10);
        docPDF.setTextColor(150, 150, 150);
        docPDF.text(`Generated: ${new Date().toLocaleDateString()}`, 105, 26, null, null, "center");

        docPDF.setTextColor(0, 0, 0);
        docPDF.setFontSize(14);
        docPDF.text(`Employee: ${name}`, 20, 38);
        docPDF.text(`Month Period: ${month}`, 20, 46);

        // 2. AutoTable (Optimized for One Page)
        docPDF.autoTable({
            startY: 55,
            head: [['Date', 'Hours', '% Day (8h)']],
            body: currentLogData,
            theme: 'striped', 
            headStyles: { fillColor: [0, 123, 255], fontSize: 11, fontStyle: 'bold' }, // Blue header
            styles: { 
                fontSize: 10, // Compact text
                halign: 'center', // Center text
                cellPadding: 2 // Reduced padding to fit more rows
            },
            columnStyles: { 0: { halign: 'left', cellWidth: 40 }, 1: { cellWidth: 30 }, 2: { cellWidth: 30 } },
            margin: { left: 20, right: 20 },
            rowPageBreak: 'avoid' // Prevent breaking rows between pages
        });

        // 3. Final Total & Corporate Seal
        const finalY = docPDF.lastAutoTable.finalY;
        docPDF.setFontSize(16);
        docPDF.setTextColor(0, 123, 255);
        docPDF.text(`TOTALE ORE: ${total} hrs`, 105, finalY + 15, null, null, "center");

        docPDF.setTextColor(200, 200, 200);
        docPDF.setFontSize(8);
        docPDF.text("Powered by WorkTime Pro - Official Document", 105, 280, null, null, "center");

        // ✅ iOS Native PDF Share Style (Perfect PDF & Share Menu)
        const pdfBlob = docPDF.output('blob');
        const pdfFile = new File([pdfBlob], `Report_${name.replace(/\s/g, '_')}_${month}.pdf`, { type: "application/pdf" });

        if (navigator.share) {
            try {
                await navigator.share({
                    files: [pdfFile],
                    title: 'Work Report Export',
                    text: `Official Hours Report for ${name}`
                });
            } catch (error) { console.error("Error sharing PDF:", error); }
        } else {
            docPDF.save(`Report_${name}.pdf`);
        }
    };
</script>
</body>
</html>
