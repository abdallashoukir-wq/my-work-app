<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro - Stable v4</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #00e676; --bg: #0d0d0d; --card: #1a1a1a; --text: #fff; --gray: #888; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .page { display: none; padding: 20px; min-height: 100vh; box-sizing: border-box; }
        .page.active { display: block; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #2a2a2a; max-width: 400px; margin: 15px auto; }
        input, textarea { width: 100%; padding: 14px; margin: 10px 0; background: #252525; border: 1px solid #333; color: white; border-radius: 12px; font-size: 16px; outline: none; }
        .btn { background: var(--primary); color: #000; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: none; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: #555; text-align: center; flex: 1; font-size: 0.75rem; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.5rem; display: block; margin-bottom: 5px; }
        .rep-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; }
        .total-box { background: rgba(0,230,118,0.1); border: 1px solid var(--primary); border-radius: 12px; padding: 20px; text-align: center; margin-top: 20px; font-size: 1.3rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <div id="page-auth" class="page active">
        <div class="card" style="margin-top: 60px; text-align: center;">
            <i class="fas fa-user-lock" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
            <h2>WorkTime Login</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="handleAuth()">Login / Sign Up</button>
        </div>
    </div>

    <div id="page-add" class="page">
        <div class="card">
            <h3 style="margin-top:0">Add Hours</h3>
            <input type="text" id="user-name" placeholder="Your Full Name">
            <hr style="border:0; border-top:1px solid #333; margin:15px 0">
            <input type="date" id="work-date">
            <input type="number" id="work-hours" placeholder="Total Hours (e.g. 8)">
            <textarea id="work-note" placeholder="Notes..." rows="2"></textarea>
            <button class="btn" id="save-btn" onclick="saveData()">SAVE WORK ✅</button>
        </div>
    </div>

    <div id="page-report" class="page" style="padding-bottom: 100px;">
        <div class="card">
            <h3 style="text-align:center; color:var(--primary);">Monthly Summary</h3>
            <div class="rep-row"><span>Name:</span> <span id="res-name" style="color:var(--primary)">---</span></div>
            <div id="logs-list" style="margin-top:10px"></div>
            <div class="total-box">TOTAL: <span id="res-total">0.0</span> hrs</div>
        </div>
        <button class="btn" style="background:#333; color:#fff;" onclick="sharePDF()">Share Report PDF <i class="fas fa-share"></i></button>
    </div>

    <nav id="navbar" class="bottom-nav">
        <div class="nav-item active" id="tab-add" onclick="showTab('add')"><i class="fas fa-plus-circle"></i>Add</div>
        <div class="nav-item" id="tab-rep" onclick="showTab('rep')"><i class="fas fa-file-alt"></i>Report</div>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let globalLogs = [];

    window.handleAuth = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } 
        catch { try { await createUserWithEmailAndPassword(auth, e, p); } catch(err){ alert(err.message); } }
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-add').classList.add('active');
            document.getElementById('navbar').style.display = 'flex';
            
            const uSnap = await getDoc(doc(db, "users", user.uid));
            if(uSnap.exists()) {
                document.getElementById('user-name').value = uSnap.data().fullname || "";
                document.getElementById('res-name').innerText = uSnap.data().fullname || "User";
            }
            fetchData(user.uid);
        } else {
            document.getElementById('page-auth').classList.add('active');
            document.getElementById('navbar').style.display = 'none';
        }
    });

    window.showTab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(t === 'add') { document.getElementById('page-add').classList.add('active'); document.getElementById('tab-add').classList.add('active'); }
        else { document.getElementById('page-report').classList.add('active'); document.getElementById('tab-rep').classList.add('active'); }
    };

    window.saveData = async () => {
        const name = document.getElementById('user-name').value;
        const date = document.getElementById('work-date').value;
        const hrs = document.getElementById('work-hours').value;
        const btn = document.getElementById('save-btn');

        if(!name || !date || !hrs) return alert("Please fill all fields!");

        btn.disabled = true;
        btn.innerText = "Saving...";

        try {
            // 1. Update Profile Name
            await setDoc(doc(db, "users", auth.currentUser.uid), { fullname: name }, { merge: true });
            
            // 2. Save Log
            const logId = `${auth.currentUser.uid}_${date}`;
            await setDoc(doc(db, "workLogs", logId), {
                uid: auth.currentUser.uid,
                fullname: name, // Save name inside log too to be safe
                date: date,
                hours: parseFloat(hrs),
                timestamp: new Date()
            }, { merge: true });

            alert("Saved! ✅");
            document.getElementById('work-hours').value = "";
            showTab('rep');
        } catch (e) { alert("Error: " + e.message); }
        finally { btn.disabled = false; btn.innerText = "SAVE WORK ✅"; }
    };

    function fetchData(uid) {
        const q = query(collection(db, "workLogs"), where("uid", "==", uid), orderBy("date", "asc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('logs-list');
            list.innerHTML = "";
            let total = 0;
            globalLogs = [];
            snap.forEach(d => {
                const data = d.data();
                total += data.hours;
                globalLogs.push([data.date, data.hours.toFixed(1)]);
                list.innerHTML += `<div class="rep-row"><span>${data.date}</span><b>${data.hours} hrs</b></div>`;
                if(data.fullname) document.getElementById('res-name').innerText = data.fullname;
            });
            document.getElementById('res-total').innerText = total.toFixed(1);
        });
    }

    window.sharePDF = async () => {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        const name = document.getElementById('res-name').innerText;
        docPDF.text("Work Report", 105, 20, null, null, "center");
        docPDF.text(`Employee: ${name}`, 20, 35);
        docPDF.autoTable({ startY: 45, head: [['Date', 'Hours']], body: globalLogs });
        
        const pdfBlob = docPDF.output('blob');
        const file = new File([pdfBlob], 'Report.pdf', { type: 'application/pdf' });
        if(navigator.share) await navigator.share({ files: [file], title: 'Work Report' });
        else docPDF.save('Report.pdf');
    };
</script>
</body>
</html>
