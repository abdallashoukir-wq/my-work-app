<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro v8.2 - Futuristic Glow</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* ========================================================
           ✅ CORE STRUCTURE - Do NOT Edit unless necessary
           ======================================================== */
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; padding: 0; overflow-x: hidden; transition: 0.3s; }
        .page { display: none; padding: 20px; position: relative; z-index: 5; min-height: 100vh; box-sizing: border-box; }
        .page.active { display: block; }
        
        input, textarea { width: 100%; padding: 18px; margin: 10px 0; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); color: #fff; border-radius: 12px; font-size: 18px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.4); }

        .btn { border: none; padding: 20px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }

        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 18px; border-bottom: 1px solid #222; margin-bottom: 8px; border-radius: 10px; transition: 0.3s; }
        
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: space-around; padding: 18px 0; border-top: 1px solid #333; z-index: 100; backdrop-filter: blur(10px); }
        .nav-item { text-align: center; flex: 1; font-size: 14px; cursor: pointer; color: #555; }
        .nav-item.active { color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.8); }

        /* ========================================================
           ✅ THE THEME PART v8.2 (Isolated & Safe to Edit) 🎨
           Inspired by: White Panels with Intense White Glow
           ======================================================== */
        
        :root {
            --f-glow-color: rgba(255, 255, 255, 0.9); /* لون توهج الإضاءة - أبيض قوي */
            --f-card-bg: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.01) 100%); /* تدرج لوني للكروت لإعطاء إحساس اللوحة */
            --f-input-bg: rgba(255, 255, 255, 0.01); /* خلفية حقول الإدخال */
        }

        /* ستايل الكروت الرئيسي (The futuristic white panel look) */
        .card {
            background: var(--f-card-bg);
            padding: 35px;
            border-radius: 25px; /* حواف مستديرة وأنيقة */
            border: 1px solid rgba(255, 255, 255, 0.08); /* حدود أنيقة */
            margin-top: 60px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.08); /* توهج خارجي ناعم وواضح */
            position: relative;
            backdrop-filter: blur(5px);
        }

        /* تأثير النيون القوي على العناوين */
        h1, h2, h3 { color: #fff; text-shadow: 0 0 20px rgba(255, 255, 255, 0.9); font-weight: 200; letter-spacing: 2px; text-transform: uppercase; }

        /* الأزرار الاحترافية بستايل مستقبلي متوهج */
        .btn {
            background: #fff; /* خلفية بيضاء ناصعة */
            color: #000; /* نص أسود للتباين */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6); /* توهج خارجي قوي */
        }
        .btn:hover { box-shadow: 0 0 30px rgba(255, 255, 255, 0.9); }

        /* حقول الإدخال داخل الكروت المستقبلية */
        input, textarea {
            background: var(--f-input-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        /* رأس صفحة التقارير */
        .info-header {
            border-left: 3px solid #fff;
            padding-left: 20px;
            background: rgba(255, 255, 255, 0.01);
            margin-bottom: 30px;
            border-radius: 0 15px 15px 0;
            box-shadow: -10px 0 20px rgba(255, 255, 255, 0.05);
        }

        /* الإجمالي في الـ PDF */
        #total-val { text-shadow: 0 0 20px rgba(255, 255, 255, 1); }

        /* الساعة الخلفية في صفحة الدخول (لون أبيض ناصع) */
        .hour, .minute { background: #fff !important; box-shadow: 0 0 10px #fff; }
        .second { background: #ff4444 !important; }
        .clock-number { color: rgba(255, 255, 255, 0.1) !important; text-shadow: none !important; }

        /* صفحة الدخول */
        #p-auth .login-wrap h1 { font-size: 55px; margin-bottom: 30px; text-align: center; }

        /* ======================================================== */
    </style>
</head>
<body>

    <div class="clock-bg" id="bg-clock">
        <div class="clock-face" id="clock-face">
            <div class="hand hour" id="hour-hand"></div>
            <div class="hand minute" id="min-hand"></div>
            <div class="hand second" id="sec-hand"></div>
            <div class="center-dot"></div>
        </div>
    </div>

    <div id="p-auth" class="page active">
        <div class="login-wrap" style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 90vh; max-width: 400px; margin: auto;">
            <h1>WELCOME</h1>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="handleAuth()">Sign In <i class="fas fa-sign-in-alt"></i></button>
            <p onclick="toggleMode()" id="toggle-txt" style="color: #666; margin-top: 30px; cursor: pointer; text-decoration: underline; font-size: 14px;">New User? Create Account</p>
        </div>
    </div>

    <div id="p-add" class="page" style="overflow-y: auto;">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>LOG TIME</h2>
                <button onclick="logout()" style="background:none; border:1px solid #555; color:#aaa; border-radius:10px; padding:8px 15px; cursor: pointer; font-size: 12px;">Logout</button>
            </div>
            <input type="text" id="u-name" placeholder="Employee Name">
            <input type="text" id="u-comp" placeholder="Company Name">
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            <input type="date" id="w-date">
            <input type="number" step="0.5" id="w-hrs" placeholder="Hours Worked">
            <textarea id="w-note" placeholder="Optional session notes..."></textarea>
            <button class="btn" onclick="saveWork()">SAVE SESSION ✅</button>
        </div>
    </div>

    <div id="p-rep" class="page" style="overflow-y: auto; padding-bottom: 130px;">
        <div class="card">
            <h3>MONTHLY REPORT</h3>
            <div class="info-header">
                <p>Employee: <b id="display-name">---</b></p>
                <p>Company: <b id="display-comp">---</b></p>
            </div>
            <label style="color:#777; font-size:14px; text-transform: uppercase; letter-spacing: 1px;">Period:</label>
            <input type="month" id="month-filter" onchange="loadLogs()">
            <div id="logs-list" style="margin-top: 20px;"></div>
            <div style="text-align: center; padding: 30px; background: rgba(255,255,255,0.02); border-radius: 20px; margin: 25px 0; border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 0 15px rgba(255,255,255,0.03);">
                TOTAL HOURS<br>
                <b id="total-val" style="font-size: 50px;">0.0</b>
            </div>
            <button class="btn" onclick="generateAndSharePDF()">EXPORT OFFICIAL PDF <i class="fas fa-file-export"></i></button>
        </div>
    </div>

    <nav id="nav-bar" class="nav">
        <div class="nav-item active" id="t-add" onclick="switchTab('add')"><i class="fas fa-plus"></i><br>Add</div>
        <div class="nav-item" id="t-rep" onclick="switchTab('rep')"><i class="fas fa-chart-line"></i><br>Report</div>
    </nav>
