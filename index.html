<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro v13 - PDF Fixed</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: rgba(0, 123, 255, 0.7); --bg: #000; --card: #1a1a1a; --text: #f5f5f5; }
        
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; }
        
        .page { display: none; padding: 20px; min-height: 100vh; position: relative; z-index: 10; }
        .page.active { display: block; }

        /* Welcome Badge */
        .welcome-badge { position: absolute; top: 8%; left: 50%; transform: translateX(-50%); font-size: 55px; font-weight: 800; color: #fff; text-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 20; }

        /* Login UI */
        .login-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; max-width: 380px; margin: auto; padding: 20px; }
        .input-group { width: 100%; margin: 10px 0; }
        input { width: 100%; padding: 18px; margin: 10px 0; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 15px; font-size: 18px; box-sizing: border-box; backdrop-filter: blur(10px); outline: none; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; backdrop-filter: blur(5px); }
        .btn:active { transform: scale(0.97); opacity: 0.8; }

        /* Clock Background */
        .clock-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); z-index: 0; overflow: hidden; }
        .clock-face { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 130vw; height: 130vw; max-width: 900px; max-height: 900px; border-radius: 50%; }
        .clock-number { position: absolute; width: 100%; height: 100%; text-align: center; font-size: 40px; font-weight: 200; color: rgba(255,255,255,0.2); padding: 25px; box-sizing: border-box; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; border-radius: 10px; }
        .hour { width: 8px; height: 25%; background: rgba(255,255,255,0.8); }
        .minute { width: 5px; height: 35%; background: rgba(255,255,255,0.5); }
        .second { width: 2px; height: 40%; background: #ff4444; }
        .center-dot { position: absolute; width: 12px; height: 12px; background: #ff4444; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* Report Style */
        .card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #222; margin-bottom: 20px; }
        .item-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; align-items: center; }
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 100; left: 0; }
        .nav-item { color: #555; text-align: center; flex: 1; font-size: 14px; cursor: pointer; }
        .nav-item.active { color: #007bff; }
    </style>
</head>
<body>

    <div class="clock-bg">
        <div class="clock-face" id="clock-face">
            <div class="hand hour" id="hour-hand"></div>
            <div class="hand minute" id="min-hand"></div>
            <div class="hand second" id="sec-hand"></div>
            <div class="center-dot"></div>
        </div>
    </div>

    <div id="p-auth" class="page active">
        <div class="welcome-badge">Welcome</div>
        <div class="login-wrapper">
            <div style="height: 60px;"></div>
            <div class="input-group">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Password">
            </div>
            <button class="btn" id="auth-btn" onclick="authAction()">Sign In</button>
            <p id="toggle-auth" onclick="toggleAuthMode()" style="color:#666; margin-top:20px; text-decoration:underline; cursor:pointer;">Create new account</p>
        </div>
    </div>

    <div id="p-add" class="page" style="overflow-y: auto;">
        <div class="card" style="margin-top: 50px;">
            <h2 style="color:#007bff">Log Work</h2>
            <input type="text" id="u-name" placeholder="Full Name">
            <input type="text" id="u-comp" placeholder="Company">
            <input type="date" id="w-date">
            <input type="number" id="w-hrs" placeholder="Hours (e.g. 8)">
            <button class="btn" onclick="saveData()" style="background:#007bff">Save Session</button>
            <button onclick="logout()" style="background:none; border:none; color:red; margin-top:20px; width:100%">Logout</button>
        </div>
    </div>

    <div id="p-rep" class="page" style="overflow-y: auto; padding-bottom: 100px;">
        <div class="card" style="margin-top: 50px;">
            <h3>Reports</h3>
            <input type="month" id="month-filter" onchange="filterLogs()">
            <div id="list-container"></div>
            <div style="text-align:center; padding:20px; border-top:1px solid #333;">
                TOTAL: <b id="r-total" style="font-size:30px; color:#007bff">0</b> Hrs
            </div>
            <button class="btn" onclick="exportPDF()" style="margin-top:10px;">Share PDF <i class="fas fa-share-nodes"></i></button>
        </div>
    </div>

    <nav id="nav" class="nav">
        <div class="nav-item active" id="t-add" onclick="tab('add')"><i class="fas fa-plus"></i><br>Add</div>
        <div class="nav-item" id="t-rep" onclick="tab('rep')"><i class="fas fa-file-lines"></i><br>Report</div>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isSignUp = false;
    let currentLogs = [];

    // Clock Logic
    function initClock() {
        const face = document.getElementById('clock-face');
        for (let i = 1; i <= 12; i++) {
            const n = document.createElement('div');
            n.className = 'clock-number';
            n.style.transform = `rotate(${i * 30}deg)`;
            n.innerHTML = `<span style="display:inline-block; transform:rotate(-${i * 30}deg)">${i}</span>`;
            face.appendChild(n);
        }
    }
    function tick() {
        const d = new Date();
        document.getElementById('sec-hand').style.transform = `rotate(${d.getSeconds()*6}deg)`;
        document.getElementById('min-hand').style.transform = `rotate(${d.getMinutes()*6}deg)`;
        document.getElementById('hour-hand').style.transform = `rotate(${(d.getHours()%12)*30 + d.getMinutes()*0.5}deg)`;
    }
    initClock(); setInterval(tick, 1000);

    // Auth Logic
    window.toggleAuthMode = () => {
        isSignUp = !isSignUp;
        document.getElementById('auth-btn').innerText = isSignUp ? "Create Account" : "Sign In";
        document.getElementById('toggle-auth').innerText = isSignUp ? "Back to Login" : "Create new account";
    };

    window.authAction = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try {
            if(isSignUp) await createUserWithEmailAndPassword(auth, e, p);
            else await signInWithEmailAndPassword(auth, e, p);
        } catch(err) { alert(err.message); }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, async (user) => {
        const pAuth = document.getElementById('p-auth'), pAdd = document.getElementById('p-add'), nav = document.getElementById('nav'), cbg = document.querySelector('.clock-bg');
        if(user) {
            pAuth.classList.remove('active'); pAdd.classList.add('active'); nav.style.display = 'flex'; cbg.style.display = 'none';
            const u = await getDoc(doc(db, "users", user.uid));
            if(u.exists()) { document.getElementById('u-name').value = u.data().fullname; document.getElementById('u-comp').value = u.data().company; }
            filterLogs();
        } else {
            pAuth.classList.add('active'); pAdd.classList.remove('active'); nav.style.display = 'none'; cbg.style.display = 'block';
        }
    });

    window.tab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-'+t).classList.add('active');
        document.getElementById('t-'+t).classList.add('active');
    }

    window.saveData = async () => {
        const n = document.getElementById('u-name').value, c = document.getElementById('u-comp').value, d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!n || !d || !h) return alert("Fill Name, Date, Hours");
        await setDoc(doc(db, "users", auth.currentUser.uid), { fullname: n, company: c }, { merge: true });
        await setDoc(doc(db, "workLogs", `${auth.currentUser.uid}_${d}`), { uid: auth.currentUser.uid, fullname: n, company: c, date: d, hours: parseFloat(h), month: d.slice(0, 7) });
        alert("Saved"); tab('rep');
    };

    window.filterLogs = () => {
        const m = document.getElementById('month-filter').value || new Date().toISOString().slice(0,7);
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), where("month", "==", m));
        onSnapshot(q, (s) => {
            const cont = document.getElementById('list-container'); cont.innerHTML = ""; let tot = 0; currentLogs = [];
            s.forEach(doc => {
                const data = doc.data(); tot += data.hours;
                currentLogs.push([data.date, data.hours.toFixed(1)]);
                cont.innerHTML += `<div class="item-row"><div><b>${data.date}</b></div><div>${data.hours}h</div></div>`;
            });
            document.getElementById('r-total').innerText = tot.toFixed(1);
        });
    };

    // ✅ FIXED PDF EXPORT & SHARE
    window.exportPDF = async () => {
        if (currentLogs.length === 0) return alert("No data to export!");
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        
        docPDF.setFontSize(18);
        docPDF.text("Work Hours Report", 105, 15, null, null, "center");
        docPDF.setFontSize(12);
        docPDF.text(`Name: ${document.getElementById('u-name').value}`, 20, 25);
        docPDF.text(`Total Hours: ${document.getElementById('r-total').innerText}`, 20, 32);

        docPDF.autoTable({
            startY: 40,
            head: [['Date', 'Hours']],
            body: currentLogs,
            theme: 'grid'
        });

        const pdfBlob = docPDF.output('blob');
        const pdfFile = new File([pdfBlob], "Report.pdf", { type: "application/pdf" });

        if (navigator.share) {
            try {
                await navigator.share({
                    files: [pdfFile],
                    title: 'Work Report',
                    text: 'My monthly work hours report'
                });
            } catch (err) {
                docPDF.save("Report.pdf");
            }
        } else {
            docPDF.save("Report.pdf");
        }
    };
</script>
</body>
</html>
