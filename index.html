<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTime Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #00e676; --bg: #0d0d0d; --card: #1a1a1a; --text: #f5f5f5; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .app-container { width: 100%; max-width: 420px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #2a2a2a; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #252525; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        .btn { background: var(--primary); color: #000; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .section { display: none; } /* سنحكم في الظهور عبر الـ JavaScript */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: none; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222; }
        .nav-item { color: #888; text-align: center; flex: 1; cursor: pointer; font-size: 0.8rem; }
        .nav-item.active { color: var(--primary); }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; }
        td, th { padding: 10px; border-bottom: 1px solid #222; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="loading-screen" style="text-align:center; margin-top:100px;">
        <i class="fas fa-spinner fa-spin" style="font-size:3rem; color:var(--primary)"></i>
        <p>جاري التحميل...</p>
    </div>

    <div id="auth-section" class="section card">
        <h2 style="text-align:center">تسجيل الدخول</h2>
        <input type="email" id="email" placeholder="الإيميل">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="btn" onclick="handleAuth()">دخول</button>
        <p onclick="toggleMode()" id="mode-text" style="text-align:center; color:var(--primary); cursor:pointer; margin-top:15px;">إنشاء حساب جديد؟</p>
    </div>

    <div id="setup-section" class="section card">
        <h2>أهلاً بك! ما هو اسمك؟</h2>
        <p style="color:#888; font-size:0.8rem">هذا الاسم سيظهر في تقارير PDF المرفوعة للشركة</p>
        <input type="text" id="user-fullname" placeholder="الاسم الكامل">
        <button class="btn" onclick="saveName()">حفظ والبدء</button>
    </div>

    <div id="add-section" class="section card">
        <h3 id="welcome-user">مرحباً</h3>
        <input type="date" id="work-date">
        <input type="number" id="work-hours" placeholder="عدد الساعات">
        <textarea id="work-note" placeholder="ملاحظات..."></textarea>
        <button class="btn" onclick="addWork()">إضافة الساعات +</button>
        <button onclick="logout()" style="background:none; border:none; color:red; width:100%; margin-top:15px; cursor:pointer">تسجيل خروج</button>
    </div>

    <div id="report-section" class="section card">
        <div id="pdf-area">
            <h3 id="report-title" style="text-align:center; color:var(--primary)">تقرير ساعات العمل</h3>
            <table id="work-table">
                <thead><tr><th>التاريخ</th><th>ساعة</th><th>ملاحظة</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <button class="btn" style="background:#444; color:white; margin-top:20px;" onclick="generatePDF()">تحميل PDF للشركة</button>
    </div>

    <div class="bottom-nav" id="menu">
        <div class="nav-item" id="btn-add" onclick="showTab('add')"><i class="fas fa-plus-circle"></i><br>إضافة</div>
        <div class="nav-item" id="btn-report" onclick="showTab('report')"><i class="fas fa-file-alt"></i><br>التقرير</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // بيانات مشروعك (تأكد أنها مطابقة للصورة)
    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isLoginMode = true;

    // تبديل بين دخول وتسجيل
    window.toggleMode = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('mode-text').innerText = isLoginMode ? "إنشاء حساب جديد؟" : "لديك حساب؟ سجل دخول";
    };

    // الدخول والإنشاء
    window.handleAuth = async () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try {
            if(isLoginMode) await signInWithEmailAndPassword(auth, e, p);
            else await createUserWithEmailAndPassword(auth, e, p);
        } catch (err) { alert(err.message); }
    };

    // حفظ الاسم لأول مرة
    window.saveName = async () => {
        const name = document.getElementById('user-fullname').value;
        if(!name) return alert("اكتب اسمك");
        await setDoc(doc(db, "users", auth.currentUser.uid), { fullname: name });
        location.reload();
    };

    // مراقبة حالة المستخدم (هذا هو قلب التطبيق)
    onAuthStateChanged(auth, async (user) => {
        document.getElementById('loading-screen').style.display = 'none';
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');

        if(user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if(userDoc.exists()) {
                const name = userDoc.data().fullname;
                document.getElementById('welcome-user').innerText = "أهلاً " + name;
                document.getElementById('report-title').innerText = "تقرير ساعات: " + name;
                document.getElementById('menu').style.display = 'flex';
                showTab('add');
            } else {
                document.getElementById('setup-section').style.display = 'block';
            }
        } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('menu').style.display = 'none';
        }
    });

    // التنقل بين التبويبات
    window.showTab = async (tab) => {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

        if(tab === 'add') {
            document.getElementById('add-section').style.display = 'block';
            document.getElementById('btn-add').classList.add('active');
        } else {
            document.getElementById('report-section').style.display = 'block';
            document.getElementById('btn-report').classList.add('active');
            await loadTable();
        }
    };

    // إضافة عمل جديد
    window.addWork = async () => {
        const date = document.getElementById('work-date').value;
        const hours = document.getElementById('work-hours').value;
        const note = document.getElementById('work-note').value;
        if(!date || !hours) return alert("أكمل البيانات");

        await addDoc(collection(db, "workLogs"), {
            uid: auth.currentUser.uid,
            date, hours, note, createdAt: new Date()
        });
        alert("تم الحفظ ✅");
        document.getElementById('work-hours').value = "";
        showTab('report');
    };

    // جلب البيانات للجدول
    async function loadTable() {
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), orderBy("date", "desc"));
        const snap = await getDocs(q);
        const tbody = document.querySelector('#work-table tbody');
        tbody.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            tbody.innerHTML += `<tr><td>${data.date}</td><td>${data.hours}</td><td>${data.note}</td></tr>`;
        });
    }

    window.logout = () => signOut(auth);
    window.generatePDF = () => {
        const element = document.getElementById('pdf-area');
        html2pdf().from(element).save();
    };
</script>

</body>
</html>
