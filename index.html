<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro - Final Company Fix</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #007bff; --bg: #0d0d0d; --card: #1a1a1a; --text: #f5f5f5; --accent: #00e676; --danger: #ff4444; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; font-size: 18px; }
        .page { display: none; padding: 20px; box-sizing: border-box; min-height: 100vh; }
        .page.active { display: block; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; max-width: 450px; margin: auto; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #222; border: 2px solid #333; color: white; border-radius: 12px; font-size: 18px; box-sizing: border-box; outline: none; }
        .btn { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 20px; margin-top: 10px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #333; background: #111; margin-bottom: 8px; border-radius: 12px; }
        .total-box { text-align: center; padding: 20px; background: rgba(0, 123, 255, 0.1); border: 1px solid var(--primary); border-radius: 15px; margin-top: 25px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: none; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: #666; text-align: center; flex: 1; font-size: 16px; font-weight: bold; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

<div id="p-auth" class="page active">
    <div class="card" style="margin-top: 60px; text-align: center;">
        <h2>Corporate Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="authAction()">Sign In</button>
    </div>
</div>

<div id="p-add" class="page">
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0; color:var(--primary);">Log Time</h3>
            <button onclick="logout()" style="background:none; border:1px solid #444; color:#888; padding:5px 10px; border-radius:8px;">Logout</button>
        </div>
        <input type="text" id="u-name" placeholder="Full Name">
        <input type="text" id="u-comp" placeholder="Company Name">
        <hr style="border:0; border-top:1px solid #333; margin:10px 0">
        <input type="date" id="w-date">
        <input type="number" step="0.5" id="w-hrs" placeholder="Hours Worked">
        <textarea id="w-note" placeholder="Note (Optional)" rows="2"></textarea>
        <button class="btn" id="s-btn" onclick="saveData()">SAVE WORK ✅</button>
    </div>
</div>

<div id="p-rep" class="page" style="padding-bottom: 100px;">
    <div class="card">
        <h3>Time Summary</h3>
        <p>Name: <span id="res-name" style="color:var(--primary)">---</span></p>
        <p>Company: <span id="res-comp" style="color:var(--primary)">---</span></p>
        <input type="month" id="month-filter" onchange="filterLogs()">
        <div id="list-container"></div>
        <div class="total-box">
            <span>TOTALE ORE:</span><br>
            <b style="font-size:35px; color:var(--primary);" id="r-total">0.0</b>
        </div>
    </div>
    <button class="btn" onclick="handleiOSSharePDF()">Export Professional PDF <i class="fas fa-share-alt"></i></button>
</div>

<nav id="nav" class="nav">
    <div class="nav-item active" id="t-add" onclick="tab('add')">Add</div>
    <div class="nav-item" id="t-rep" onclick="tab('rep')">Report</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById('month-filter').value = new Date().toISOString().slice(0, 7);

    window.authAction = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch { try { await createUserWithEmailAndPassword(auth, e, p); } catch(err){ alert(err.message); } }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            tab('add');
            document.getElementById('nav').style.display = 'flex';
            const uSnap = await getDoc(doc(db, "users", user.uid));
            if(uSnap.exists()) {
                const d = uSnap.data();
                document.getElementById('u-name').value = d.fullname || "";
                document.getElementById('u-comp').value = d.company || "";
                document.getElementById('res-name').innerText = d.fullname || "User";
                document.getElementById('res-comp').innerText = d.company || "Not Specified";
            }
            filterLogs(); 
        } else {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-auth').classList.add('active');
            document.getElementById('nav').style.display = 'none';
        }
    });

    window.tab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-' + t).classList.add('active');
        document.getElementById('t-' + t).classList.add('active');
    };

    window.saveData = async () => {
        const n = document.getElementById('u-name').value, c = document.getElementById('u-comp').value, d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!n || !d || !h) return alert("Fill Name, Date and Hours!");
        const btn = document.getElementById('s-btn'); btn.disabled = true;
        try {
            // تحديث البروفايل فوراً
            await setDoc(doc(db, "users", auth.currentUser.uid), { fullname: n, company: c }, { merge: true });
            document.getElementById('res-comp').innerText = c;
            
            const docId = `${auth.currentUser.uid}_${d}`; 
            await setDoc(doc(db, "workLogs", docId), {
                uid: auth.currentUser.uid,
                fullname: n, company: c, date: d, hours: parseFloat(h), month: d.slice(0, 7)
            });
            alert("Saved! ✅"); tab('rep');
        } catch (e) { alert(e.message); }
        btn.disabled = false;
    };

    window.deleteLog = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "workLogs", id)); };

    let currentLogData = []; 
    window.filterLogs = () => {
        const month = document.getElementById('month-filter').value;
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), where("month", "==", month));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('list-container'); list.innerHTML = ""; let total = 0; currentLogData = [];
            snap.forEach(d => {
                const data = d.data(); total += data.hours;
                const percent = (data.hours / 8) * 100;
                currentLogData.push([data.date, data.hours.toFixed(1), `${percent.toFixed(0)}%`]);
                list.innerHTML += `<div class="item-row"><div><b>${data.date}</b><br>${data.hours} hrs</div><button onclick="deleteLog('${d.id}')" style="background:none;border:none;color:var(--danger)"><i class="fas fa-trash"></i></button></div>`;
            });
            document.getElementById('r-total').innerText = total.toFixed(1);
        });
    }

    window.handleiOSSharePDF = async () => {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        const name = document.getElementById('res-name').innerText;
        const comp = document.getElementById('u-comp').value || document.getElementById('res-comp').innerText;
        const month = document.getElementById('month-filter').value;
        const total = document.getElementById('r-total').innerText;

        docPDF.setFontSize(22); docPDF.setTextColor(0, 123, 255);
        docPDF.text(`${comp}`, 105, 20, null, null, "center");
        docPDF.setFontSize(14); docPDF.setTextColor(0,0,0);
        docPDF.text(`Work Report - ${month}`, 105, 30, null, null, "center");
        docPDF.text(`Employee: ${name}`, 20, 45);
        
        docPDF.autoTable({
            startY: 55, head: [['Date', 'Hours', '% Day']], body: currentLogData,
            theme: 'striped', headStyles: { fillColor: [0, 123, 255] }, styles: { halign: 'center' }
        });

        docPDF.setFontSize(16); docPDF.text(`TOTAL HOURS: ${total} hrs`, 105, docPDF.lastAutoTable.finalY + 15, null, null, "center");

        const pdfBlob = docPDF.output('blob');
        const pdfFile = new File([pdfBlob], `Report_${month}.pdf`, { type: "application/pdf" });
        if (navigator.share) await navigator.share({ files: [pdfFile] }); else docPDF.save(`Report.pdf`);
    };
</script>
</body>
</html>
