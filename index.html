<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro - Final Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #00e676; --bg: #0d0d0d; --card: #1a1a1a; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #2a2a2a; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        .btn { background: var(--primary); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: none; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
        .nav-item { color: #555; flex: 1; text-align: center; }
        .nav-item.active { color: var(--primary); }
        .item-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #222; background: #111; margin-bottom: 5px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="p-auth" class="page active">
    <div class="card" style="margin-top: 50px; text-align: center;">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="authAction()">Login</button>
    </div>
</div>

<div id="p-add" class="page">
    <div class="card">
        <h3>Add Work</h3>
        <input type="text" id="u-name" placeholder="Full Name">
        <input type="date" id="w-date">
        <input type="number" id="w-hrs" placeholder="Hours">
        <button class="btn" id="s-btn" onclick="saveData()">SAVE ✅</button>
    </div>
</div>

<div id="p-rep" class="page" style="padding-bottom: 80px;">
    <div class="card">
        <h3 style="text-align:center; color:var(--primary)">Monthly Report</h3>
        <p>User: <span id="r-name" style="color:var(--primary)">---</span></p>
        <div id="list-container"></div>
        <div style="text-align:center; margin-top:20px; font-size:1.3rem;">Total: <span id="r-total" style="color:var(--primary)">0</span> hrs</div>
    </div>
    <button class="btn" style="background:#333; color:#fff; margin-top:20px;" onclick="sharePDF()">Share PDF Report</button>
</div>

<nav id="nav" class="nav">
    <div class="nav-item active" id="t-add" onclick="tab('add')">Add</div>
    <div class="nav-item" id="t-rep" onclick="tab('rep')">Report</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.authAction = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch { try { await createUserWithEmailAndPassword(auth, e, p); } catch(err){ alert(err.message); } }
    };

    onAuthStateChanged(auth, (user) => {
        if(user) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-add').classList.add('active');
            document.getElementById('nav').style.display = 'flex';
            loadData(user.uid);
        }
    });

    window.tab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-' + t).classList.add('active');
        document.getElementById('t-' + t).classList.add('active');
    };

    window.saveData = async () => {
        const n = document.getElementById('u-name').value, d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!n || !d || !h) return alert("Please fill all fields!");
        try {
            // حفظ بدون أي تعقيدات في الـ ID
            const docId = `${auth.currentUser.uid}_${Date.now()}`; 
            await setDoc(doc(db, "workLogs", docId), {
                uid: auth.currentUser.uid,
                name: n,
                date: d,
                hours: parseFloat(h)
            });
            alert("Success! Check the report.");
            tab('rep');
        } catch (e) { alert("Error saving: " + e.message); }
    };

    let pdfData = [];
    function loadData(uid) {
        // استماع بسيط جداً بدون ترتيب (OrderBy) لتجنب أخطاء الفهرسة
        const q = query(collection(db, "workLogs"), where("uid", "==", uid));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('list-container');
            list.innerHTML = ""; pdfData = []; let total = 0;
            
            if(snap.empty) {
                list.innerHTML = "<p style='text-align:center; color:#555;'>No data found. Add some hours!</p>";
            }

            snap.forEach(doc => {
                const data = doc.data();
                total += data.hours;
                pdfData.push([data.date, data.hours.toFixed(1)]);
                document.getElementById('r-name').innerText = data.name;
                list.innerHTML += `<div class="item-row"><span>${data.date}</span><b>${data.hours} hrs</b></div>`;
            });
            document.getElementById('r-total').innerText = total.toFixed(1);
        }, (err) => {
            console.error(err);
            alert("Database Error: " + err.message);
        });
    }

    window.sharePDF = async () => {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        docPDF.text("Work Report", 20, 20);
        docPDF.autoTable({ startY: 30, head: [['Date', 'Hours']], body: pdfData });
        const pdfBlob = docPDF.output('blob');
        const file = new File([pdfBlob], 'Report.pdf', { type: 'application/pdf' });
        if(navigator.share) await navigator.share({ files: [file] }); else docPDF.save('Report.pdf');
    };
</script>
</body>
</html>
