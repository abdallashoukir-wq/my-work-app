<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro - Final Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #00e676; --bg: #0d0d0d; --card: #1a1a1a; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; direction: ltr; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #2a2a2a; max-width: 400px; margin: auto; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        .btn { background: var(--primary); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: none; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222; }
        .nav-item { color: #555; text-align: center; flex: 1; cursor: pointer; font-size: 0.8rem; }
        .nav-item.active { color: var(--primary); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { color: #888; text-align: left; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div id="auth-page" class="page active">
    <div class="card" style="margin-top: 50px; text-align: center;">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="authAction()">Login / Register</button>
    </div>
</div>

<div id="main-page" class="page">
    <div class="card">
        <h3>Add Work Hours</h3>
        <input type="text" id="name" placeholder="Full Name">
        <input type="date" id="date">
        <input type="number" id="hours" placeholder="Hours">
        <textarea id="note" placeholder="Notes..."></textarea>
        <button class="btn" onclick="saveData()">SAVE NOW ✅</button>
    </div>
</div>

<div id="report-page" class="page">
    <div class="card" id="pdf-area" style="background: #111;">
        <h2 style="color: var(--primary); text-align: center;">Work Report</h2>
        <p>Name: <span id="rep-name" style="color: var(--primary);"></span></p>
        <table>
            <thead><tr><th>Date</th><th>Hours</th></tr></thead>
            <tbody id="tbody"></tbody>
        </table>
        <h3 style="text-align: center; margin-top: 20px;">Total: <span id="total">0</span> hrs</h3>
    </div>
    <div style="text-align: center; margin-top: 20px;">
        <button class="btn" style="background: #333; color: #fff; width: 200px;" onclick="download()">Download PDF</button>
    </div>
</div>

<nav id="navbar" class="nav">
    <div class="nav-item active" id="n1" onclick="tab('main')">Add</div>
    <div class="nav-item" id="n2" onclick="tab('report')">Report</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.authAction = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } 
        catch { try { await createUserWithEmailAndPassword(auth, e, p); } catch (err) { alert(err.message); } }
    };

    onAuthStateChanged(auth, (user) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        if(user) {
            document.getElementById('main-page').classList.add('active');
            document.getElementById('navbar').style.display = 'flex';
            loadData(user.uid);
        } else {
            document.getElementById('auth-page').classList.add('active');
        }
    });

    window.tab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(t === 'main') { document.getElementById('main-page').classList.add('active'); document.getElementById('n1').classList.add('active'); }
        else { document.getElementById('report-page').classList.add('active'); document.getElementById('n2').classList.add('active'); }
    };

    window.saveData = async () => {
        const name = document.getElementById('name').value, date = document.getElementById('date').value, hrs = document.getElementById('hours').value;
        if(!name || !date || !hrs) return alert("Fill all fields!");
        
        const id = `${auth.currentUser.uid}_${date}`;
        try {
            await setDoc(doc(db, "workLogs", id), {
                uid: auth.currentUser.uid,
                name: name,
                date: date,
                hours: parseFloat(hrs),
                note: document.getElementById('note').value
            });
            alert("Saved Successfully! ✅");
            tab('report');
        } catch (e) { alert("Save Error: " + e.message); }
    };

    function loadData(uid) {
        const q = query(collection(db, "workLogs"), where("uid", "==", uid));
        onSnapshot(q, (snap) => {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = ""; let total = 0;
            snap.forEach(d => {
                const data = d.data();
                total += data.hours;
                document.getElementById('rep-name').innerText = data.name;
                tbody.innerHTML += `<tr><td>${data.date}</td><td>${data.hours}</td></tr>`;
            });
            document.getElementById('total').innerText = total;
        });
    }

    window.download = () => html2pdf().from(document.getElementById('pdf-area')).save('report.pdf');
</script>
</body>
</html>
