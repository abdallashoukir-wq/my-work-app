<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #00e676; --bg: #0d0d0d; --card: #1a1a1a; --text: #f5f5f5; --danger: #ff4444; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .app-container { width: 100%; max-width: 420px; margin: 0 auto; padding: 20px; box-sizing: border-box; padding-bottom: 80px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #2a2a2a; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #252525; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { background: var(--primary); color: #000; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        #main-app, .tab-content { display: none; }
        .tab-content.active { display: block; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: #888; text-align: center; flex: 1; cursor: pointer; font-size: 0.8rem; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 4px; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; background: #111; }
        td, th { padding: 12px; border-bottom: 1px solid #222; text-align: center; }
        th { color: var(--primary); background: #1a1a1a; }
        .btn-del { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 1rem; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <i class="fas fa-circle-notch fa-spin" style="font-size:3rem; color:var(--primary)"></i>
    <p style="margin-top:15px">جاري مزامنة البيانات...</p>
</div>

<div class="app-container">
    <div id="auth-section" class="card">
        <div style="text-align:center; margin-bottom:20px;">
            <i class="fas fa-user-clock" style="font-size:3rem; color:var(--primary)"></i>
            <h2>تسجيل الدخول</h2>
        </div>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="btn" onclick="handleAuth()">دخول للنظام</button>
        <p onclick="toggleMode()" id="mode-text" style="text-align:center; color:var(--primary); cursor:pointer; margin-top:20px; font-size:0.9rem;">ليس لديك حساب؟ إنشاء حساب جديد</p>
    </div>

    <div id="main-app">
        <div id="name-setup" class="card" style="display:none; border: 2px solid var(--primary); background: #002b16;">
            <h3 style="margin-top:0">أهلاً بك! يرجى إدخال اسمك</h3>
            <p style="font-size:0.8rem; color:#ccc;">هذا الاسم سيظهر في تقارير PDF الخاصة بالشركة.</p>
            <input type="text" id="fullname-input" placeholder="اكتب اسمك الحقيقي هنا">
            <button class="btn" onclick="saveUserName()">حفظ الاسم والبدء ✅</button>
        </div>

        <div id="add-tab" class="tab-content active">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="margin:0">إضافة ساعات العمل</h3>
                    <button onclick="logout()" style="color:var(--danger); background:none; border:none; cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                <label style="font-size:0.8rem; color:#888;">تاريخ اليوم:</label>
                <input type="date" id="work-date">
                <input type="number" id="work-hours" placeholder="عدد الساعات (مثلاً: 8)">
                <textarea id="work-note" placeholder="ملاحظة العمل (اختياري)..." rows="2"></textarea>
                <button class="btn" onclick="addEntry()">حفظ في السجل +</button>
            </div>
        </div>

        <div id="report-tab" class="tab-content">
            <div class="card" id="pdf-area" style="padding:10px;">
                <div style="text-align:center; border-bottom:2px solid var(--primary); padding-bottom:10px; margin-bottom:10px;">
                    <h2 id="report-name" style="margin:0; color:var(--primary); font-size:1.2rem;">تقرير الساعات</h2>
                    <small id="report-date" style="color:#888;"></small>
                </div>
                <table id="work-table">
                    <thead><tr><th>التاريخ</th><th>ساعة</th><th>ملاحظة</th><th>حذف</th></tr></thead>
                    <tbody></tbody>
                </table>
                <div style="margin-top:15px; padding:10px; background:#000; border-radius:10px; text-align:center;">
                    <span style="color:#888;">إجمالي الساعات: </span>
                    <span id="total-hours-sum" style="color:var(--primary); font-weight:bold; font-size:1.2rem;">0</span>
                </div>
            </div>
            <button class="btn" style="background:#333; color:white; margin-top:10px;" onclick="exportPDF()">تصدير ومشاركة PDF <i class="fas fa-file-pdf"></i></button>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" id="nav-add" onclick="switchTab('add')"><i class="fas fa-plus-circle"></i>إضافة</div>
            <div class="nav-item" id="nav-report" onclick="switchTab('report')"><i class="fas fa-file-invoice"></i>التقرير</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, query, where, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let loginMode = true;

    window.toggleMode = () => {
        loginMode = !loginMode;
        document.getElementById('mode-text').innerText = loginMode ? "ليس لديك حساب؟ إنشاء حساب جديد" : "لديك حساب؟ سجل دخولك الآن";
    };

    window.handleAuth = async () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        if(!e || !p) return alert("يرجى ملء كافة الحقول");
        try {
            if(loginMode) await signInWithEmailAndPassword(auth, e, p);
            else await createUserWithEmailAndPassword(auth, e, p);
        } catch (err) { alert("خطأ: " + err.message); }
    };

    onAuthStateChanged(auth, async (user) => {
        document.getElementById('loading').style.display = 'none';
        if(user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            checkUserName(user.uid);
        } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    async function checkUserName(uid) {
        const d = await getDoc(doc(db, "users", uid));
        if(d.exists() && d.data().fullname) {
            document.getElementById('report-name').innerText = d.data().fullname;
            document.getElementById('name-setup').style.display = 'none';
        } else {
            document.getElementById('name-setup').style.display = 'block';
        }
    }

    window.saveUserName = async () => {
        const name = document.getElementById('fullname-input').value.trim();
        if(!name) return alert("من فضلك اكتب اسمك");
        await setDoc(doc(db, "users", auth.currentUser.uid), { fullname: name });
        document.getElementById('name-setup').style.display = 'none';
        document.getElementById('report-name').innerText = name;
        alert("تم حفظ الاسم بنجاح!");
    };

    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(tab === 'add') {
            document.getElementById('add-tab').classList.add('active');
            document.getElementById('nav-add').classList.add('active');
        } else {
            document.getElementById('report-tab').classList.add('active');
            document.getElementById('nav-report').classList.add('active');
            loadData();
        }
    };

    window.addEntry = async () => {
        const date = document.getElementById('work-date').value;
        const hours = document.getElementById('work-hours').value;
        const note = document.getElementById('work-note').value;
        if(!date || !hours) return alert("أدخل التاريخ والساعات");
        await addDoc(collection(db, "workLogs"), { uid: auth.currentUser.uid, date, hours: parseFloat(hours), note, ts: new Date() });
        alert("تم الحفظ ✅");
        document.getElementById('work-hours').value = "";
        document.getElementById('work-note').value = "";
        switchTab('report');
    };

    async function loadData() {
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), orderBy("date", "desc"));
        const snap = await getDocs(q);
        const tbody = document.querySelector('#work-table tbody');
        tbody.innerHTML = "";
        let total = 0;
        snap.forEach(d => {
            const data = d.data();
            total += data.hours;
            tbody.innerHTML += `<tr><td>${data.date}</td><td><b>${data.hours}</b></td><td>${data.note}</td><td><button class="btn-del" onclick="deleteItem('${d.id}')"><i class="fas fa-trash"></i></button></td></tr>`;
        });
        document.getElementById('total-hours-sum').innerText = total;
        document.getElementById('report-date').innerText = "تاريخ التقرير: " + new Date().toLocaleDateString('ar-EG');
    }

    window.deleteItem = async (id) => {
        if(confirm("هل متأكد من حذف هذا السجل؟")) {
            await deleteDoc(doc(db, "workLogs", id));
            loadData();
        }
    };

    window.logout = () => signOut(auth);
    window.exportPDF = () => {
        const element = document.getElementById('pdf-area');
        const opt = { margin: 10, filename: 'تقرير_ساعات_العمل.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(element).save();
    };
</script>
</body>
</html>
