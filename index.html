<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Slim v17</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --glow: #fff; --accent: #007bff; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 0; overflow: hidden; }
        
        /* ✨ خلفية v8 الأصلية */
        .v8-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1; }
        .ray { position: absolute; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.08), transparent); width: 1px; height: 100vh; animation: moveRay 8s infinite linear; }
        @keyframes moveRay { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

        .page { display: none; padding: 15px; min-height: 100vh; box-sizing: border-box; position: relative; z-index: 5; }
        .page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* 📱 تصميم صفحة Add المصغر (نحيف وبسيط) */
        .slim-card { 
            background: rgba(255, 255, 255, 0.02); 
            width: 100%; 
            max-width: 320px; 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h2 { font-size: 18px; text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 20px; color: var(--glow); }

        input, textarea, select { 
            width: 100%; padding: 12px; margin: 8px 0; 
            background: rgba(255,255,255,0.05); border: 1px solid #333; 
            color: #fff; border-radius: 10px; outline: none; font-size: 14px; box-sizing: border-box; 
        }

        .btn { 
            background: #fff; color: #000; border: none; padding: 15px; 
            width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; 
            margin-top: 10px; font-size: 14px; transition: 0.3s;
        }

        /* القائمة السفلية */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-item { color: #555; text-align: center; flex: 1; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: #fff; }

        .signature { font-size: 14px; font-weight: bold; margin-top: 20px; opacity: 0.8; text-transform: uppercase; }
        
        .top-bar { position: fixed; top: 10px; right: 10px; z-index: 20; display: flex; gap: 10px; }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid #444; color: #fff; padding: 5px 10px; border-radius: 5px; font-size: 10px; }
        
        .rtl { direction: rtl; text-align: right; }
    </style>
</head>
<body>

    <div class="v8-bg">
        <div class="ray" style="left:20%"></div><div class="ray" style="left:50%"></div><div class="ray" style="left:80%"></div>
    </div>

    <div class="top-bar">
        <select class="lang-btn" id="lang-select" onchange="setLanguage(this.value)">
            <option value="en">EN</option>
            <option value="it">IT</option>
            <option value="ar">AR</option>
        </select>
        <button class="lang-btn" onclick="logout()"><i class="fas fa-power-off"></i></button>
    </div>

    <div id="p-auth" class="page active">
        <div class="slim-card" style="text-align: center;">
            <h1 style="font-size: 24px; font-weight: 200;">WORKTIME</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="handleAuth()">SIGN IN</button>
            <div class="signature">Created by Shoukir Abdalla</div>
        </div>
    </div>

    <div id="p-add" class="page">
        <div class="slim-card">
            <h2 id="l-add-title">Add Hours</h2>
            <input type="text" id="u-name" placeholder="Name">
            <input type="text" id="u-comp" placeholder="Company">
            <hr style="border:0; border-top:1px solid #222;">
            <input type="date" id="w-date">
            <input type="text" id="w-loc" placeholder="Location">
            <input type="number" step="0.5" id="w-hrs" placeholder="Hours">
            <textarea id="w-note" placeholder="Notes (Arabic OK)" rows="2"></textarea>
            <button class="btn" onclick="saveWork()" id="l-save-btn">SAVE ✅</button>
        </div>
        <div class="signature">Created by Shoukir Abdalla</div>
    </div>

    <div id="p-rep" class="page">
        <div class="slim-card" style="max-width: 350px;">
            <h2 id="l-rep-title">Report</h2>
            <input type="month" id="month-filter" onchange="loadLogs()">
            <div id="logs-list" style="max-height: 200px; overflow-y: auto; margin: 10px 0; font-size: 12px;"></div>
            <div style="text-align: center; margin-bottom: 10px;">
                <small id="l-total">TOTAL</small><br>
                <b id="total-val" style="font-size: 30px;">0.0</b>
            </div>
            <button class="btn" onclick="generatePDF()">DOWNLOAD PDF <i class="fas fa-file-pdf"></i></button>
        </div>
        <div class="signature">Created by Shoukir Abdalla</div>
    </div>

    <nav id="nav-bar" class="nav">
        <div class="nav-item active" id="t-add" onclick="switchTab('add')"><i class="fas fa-plus"></i><br>ADD</div>
        <div class="nav-item" id="t-rep" onclick="switchTab('rep')"><i class="fas fa-file-alt"></i><br>REPORT</div>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const langData = {
        en: { add: "Log Hours", rep: "Report", save: "SAVE", total: "TOTAL HOURS", months: ["January","February","March","April","May","June","July","August","September","October","November","December"] },
        it: { add: "Registra Ore", rep: "Rapporto", save: "SALVA", total: "TOTALE ORE", months: ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"] },
        ar: { add: "إضافة ساعات", rep: "التقرير", save: "حفظ", total: "إجمالي الساعات", months: ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"] }
    };

    let curLang = 'en';

    window.setLanguage = (l) => {
        curLang = l;
        document.body.className = l === 'ar' ? 'rtl' : '';
        document.getElementById('l-add-title').innerText = langData[l].add;
        document.getElementById('l-rep-title').innerText = langData[l].rep;
        document.getElementById('l-save-btn').innerText = langData[l].save;
        document.getElementById('l-total').innerText = langData[l].total;
        loadLogs();
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            switchTab('add');
            document.getElementById('p-auth').classList.remove('active');
            document.getElementById('nav-bar').style.display = 'flex';
            const u = await getDoc(doc(db, "users", user.uid));
            if(u.exists()) {
                document.getElementById('u-name').value = u.data().fullname || "";
                document.getElementById('u-comp').value = u.data().company || "";
            }
            loadLogs();
        } else {
            document.getElementById('p-auth').classList.add('active');
            document.getElementById('nav-bar').style.display = 'none';
        }
    });

    window.handleAuth = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert("Error"); }
    };

    window.logout = () => signOut(auth);

    window.saveWork = async () => {
        const d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!d || !h) return alert("Fill all");
        await setDoc(doc(db, "workLogs", `${auth.currentUser.uid}_${d}`), {
            uid: auth.currentUser.uid, date: d, hours: parseFloat(h),
            location: document.getElementById('w-loc').value,
            note: document.getElementById('w-note').value,
            month: d.slice(0,7)
        }, {merge: true});
        alert("Saved! ✅"); switchTab('rep');
    };

    window.deleteLog = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "workLogs", id)); };

    let cached = [];
    window.loadLogs = () => {
        const m = document.getElementById('month-filter').value || new Date().toISOString().slice(0,7);
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), where("month", "==", m));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('logs-list'); list.innerHTML = ""; let tot = 0; cached = [];
            snap.forEach(d => {
                const data = d.data(); tot += data.hours;
                cached.push([data.date, data.location || "-", data.note || "-", data.hours.toFixed(1)]);
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #222;">
                    <span>${data.date}</span><b>${data.hours}h</b>
                    <i class="fas fa-trash" style="color:red" onclick="deleteLog('${d.id}')"></i>
                </div>`;
            });
            document.getElementById('total-val').innerText = tot.toFixed(1);
            cached.sort((a,b) => new Date(a[0]) - new Date(b[0]));
        });
    };

    // وظيفة معالجة العربية للـ PDF (عكس الحروف يدوياً لضمان الظهور)
    const fixAr = (text) => {
        if (!/[\u0600-\u06FF]/.test(text)) return text;
        return text.split(' ').map(word => word.split('').reverse().join('')).reverse().join('  ');
    };

    window.generatePDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const mVal = document.getElementById('month-filter').value || "2026-03";
        const mName = langData[curLang].months[parseInt(mVal.split('-')[1])-1];

        doc.setFillColor(0, 123, 255); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255,255,255); doc.setFontSize(22);
        doc.text(`${mName.toUpperCase()} ${mVal.split('-')[0]}`, 105, 25, null, null, "center");

        doc.setTextColor(0,0,0); doc.setFontSize(14);
        doc.text(`Employee: ${document.getElementById('u-name').value}`, 15, 50);
        doc.text(`Company: ${document.getElementById('u-comp').value}`, 15, 58);

        // معالجة الملاحظات العربية قبل الطباعة
        const fixedData = cached.map(row => [row[0], row[1], fixAr(row[2]), row[3]]);

        doc.autoTable({
            startY: 70,
            head: [['Date', 'Location', 'Notes', 'Hrs']],
            body: fixedData,
            theme: 'grid',
            headStyles: { fillColor: [0, 123, 255] },
            styles: { font: "courier" } // استخدام خط قياسي يدعم المسافات
        });

        doc.setFontSize(18);
        doc.text(`TOTAL: ${document.getElementById('total-val').innerText} HRS`, 200, doc.lastAutoTable.finalY + 20, null, null, "right");
        
        doc.setFontSize(14); doc.setTextColor(150);
        doc.text("Created by Shoukir Abdalla", 105, 285, null, null, "center");

        doc.save(`Report_${mVal}.pdf`);
    };

    window.switchTab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-'+t).classList.add('active');
        document.getElementById('t-'+t).classList.add('active');
    };
</script>
</body>
</html>
