<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro - Final Sync</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #00e676; --bg: #0d0d0d; --card: #1a1a1a; --text: #fff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .page { display: none; padding: 20px; min-height: 100vh; box-sizing: border-box; }
        .page.active { display: block; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #2a2a2a; max-width: 400px; margin: auto; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        .btn { background: var(--primary); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: none; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; }
        .nav-item { color: #555; text-align: center; flex: 1; font-size: 0.8rem; }
        .nav-item.active { color: var(--primary); }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div id="p-auth" class="page active">
    <div class="card" style="margin-top: 50px; text-align: center;">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="authAction()">Login</button>
    </div>
</div>

<div id="p-add" class="page">
    <div class="card">
        <h3>Add Hours</h3>
        <input type="text" id="u-name" placeholder="Full Name">
        <input type="date" id="w-date">
        <input type="number" id="w-hrs" placeholder="Hours">
        <button class="btn" id="s-btn" onclick="saveData()">SAVE ✅</button>
    </div>
</div>

<div id="p-rep" class="page" style="padding-bottom: 80px;">
    <div class="card">
        <h3 style="text-align:center; color:var(--primary)">Report</h3>
        <p>Name: <span id="r-name" style="color:var(--primary)">---</span></p>
        <div id="list"></div>
        <div style="text-align:center; margin-top:15px; font-weight:bold; font-size:1.2rem;">Total: <span id="r-total">0</span> hrs</div>
    </div>
    <button class="btn" style="background:#333; color:#fff; margin-top:20px;" onclick="sharePDF()">Share PDF</button>
</div>

<nav id="nav" class="nav">
    <div class="nav-item active" id="t-add" onclick="tab('add')">Add</div>
    <div class="nav-item" id="t-rep" onclick="tab('rep')">Report</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.authAction = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch { try { await createUserWithEmailAndPassword(auth, e, p); } catch(err){ alert(err.message); } }
    };

    onAuthStateChanged(auth, (user) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        if(user) {
            document.getElementById('p-add').classList.add('active');
            document.getElementById('nav').style.display = 'flex';
            loadData(user.uid);
        } else { document.getElementById('p-auth').classList.add('active'); }
    });

    window.tab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-' + t).classList.add('active');
        document.getElementById('t-' + t).classList.add('active');
    };

    window.saveData = async () => {
        const n = document.getElementById('u-name').value, d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!n || !d || !h) return alert("Fill all!");
        const btn = document.getElementById('s-btn');
        btn.disabled = true;
        try {
            // حفظ مباشر وبسيط
            await setDoc(doc(db, "workLogs", `${auth.currentUser.uid}_${d}`), {
                uid: auth.currentUser.uid,
                name: n,
                date: d,
                hours: parseFloat(h)
            });
            alert("Saved! ✅");
            tab('rep');
        } catch (e) { alert("Error: " + e.message); }
        btn.disabled = false;
    };

    let logs = [];
    function loadData(uid) {
        // حذفنا orderBy مؤقتاً لتجنب مشاكل Indexing
        const q = query(collection(db, "workLogs"), where("uid", "==", uid));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('list');
            list.innerHTML = ""; logs = []; let total = 0;
            snap.forEach(doc => {
                const data = doc.data();
                total += data.hours;
                logs.push([data.date, data.hours.toFixed(1)]);
                document.getElementById('r-name').innerText = data.name;
                list.innerHTML += `<div class="row"><span>${data.date}</span><b>${data.hours} hrs</b></div>`;
            });
            document.getElementById('r-total').innerText = total.toFixed(1);
        }, (err) => { alert("Database Error: " + err.message); });
    }

    window.sharePDF = async () => {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        docPDF.text("Work Report", 20, 20);
        docPDF.autoTable({ startY: 30, head: [['Date', 'Hours']], body: logs });
        const pdfBlob = docPDF.output('blob');
        const file = new File([pdfBlob], 'Report.pdf', { type: 'application/pdf' });
        if(navigator.share) await navigator.share({ files: [file] }); else docPDF.save('Report.pdf');
    };
</script>
</body>
</html>
