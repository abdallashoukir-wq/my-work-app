<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro v8.3 - Login Fixed</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        /* ========================================================
           🎨 THEME PART (Isolated Section)
           ======================================================== */
        :root {
            --glow: rgba(255, 255, 255, 0.8);
            --card-bg: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
        }

        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Futuristic Panels */
        .card {
            background: var(--card-bg);
            padding: 30px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px); margin-top: 50px;
        }

        /* Neon Glow Text */
        h1, h2, h3 { text-shadow: 0 0 15px var(--glow); font-weight: 200; text-transform: uppercase; letter-spacing: 2px; }

        /* White Neon Button */
        .btn {
            background: #fff; color: #000; border: none; padding: 18px;
            width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px;
            cursor: pointer; margin-top: 15px; box-shadow: 0 0 20px rgba(255,255,255,0.5);
            transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn:active { transform: scale(0.97); box-shadow: 0 0 10px #fff; }

        /* Inputs */
        input, textarea {
            width: 100%; padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 10px;
            font-size: 16px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        /* Nav Bar */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-item { color: #555; text-align: center; flex: 1; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #fff; text-shadow: 0 0 10px #fff; }

        .page { display: none; padding: 20px; min-height: 100vh; box-sizing: border-box; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <div id="p-auth" class="page active">
        <div style="max-width: 400px; margin: 100px auto; text-align: center;">
            <h1 style="font-size: 40px;">WorkTime</h1>
            <div class="card">
                <input type="email" id="email" placeholder="Email Address">
                <input type="password" id="pass" placeholder="Password">
                <button class="btn" id="loginBtn" onclick="handleAuth()">SIGN IN <i class="fas fa-sign-in-alt"></i></button>
                <p onclick="toggleMode()" id="toggle-txt" style="color: #666; margin-top: 20px; cursor: pointer; text-decoration: underline;">New? Create Account</p>
            </div>
        </div>
    </div>

    <div id="p-add" class="page">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Log Hours</h2>
                <button onclick="logout()" style="background:none; border:1px solid #444; color:#888; padding:5px 10px; border-radius:8px;">Logout</button>
            </div>
            <input type="text" id="u-name" placeholder="Employee Name">
            <input type="text" id="u-comp" placeholder="Company Name">
            <input type="date" id="w-date">
            <input type="number" step="0.5" id="w-hrs" placeholder="Hours Worked">
            <button class="btn" onclick="saveWork()">SAVE SESSION ✅</button>
        </div>
    </div>

    <div id="p-rep" class="page" style="padding-bottom: 100px;">
        <div class="card">
            <h3>Monthly Report</h3>
            <div id="user-info-display" style="font-size:14px; color:#aaa; margin-bottom:15px; border-left:2px solid #fff; padding-left:10px;">
                User: <span id="display-name" style="color:#fff">---</span><br>
                Company: <span id="display-comp" style="color:#fff">---</span>
            </div>
            <input type="month" id="month-filter" onchange="loadLogs()">
            <div id="logs-list" style="margin-top:15px;"></div>
            <div style="text-align:center; padding:20px; background:rgba(255,255,255,0.05); border-radius:15px; margin:20px 0;">
                TOTAL: <b id="total-val" style="font-size:35px;">0.0</b> Hrs
            </div>
            <button class="btn" onclick="generateAndSharePDF()">SHARE PDF <i class="fas fa-file-pdf"></i></button>
        </div>
    </div>

    <nav id="nav-bar" class="nav">
        <div class="nav-item active" id="t-add" onclick="switchTab('add')"><i class="fas fa-plus"></i><br>Add</div>
        <div class="nav-item" id="t-rep" onclick="switchTab('rep')"><i class="fas fa-chart-bar"></i><br>Report</div>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isSignUp = false;
    let cachedLogs = [];

    // --- Authentication Logic ---
    window.toggleMode = () => {
        isSignUp = !isSignUp;
        document.getElementById('loginBtn').innerText = isSignUp ? "CREATE ACCOUNT" : "SIGN IN";
        document.getElementById('toggle-txt').innerText = isSignUp ? "Back to Login" : "New? Create Account";
    };

    window.handleAuth = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(!e || !p) return alert("Please enter email and password");
        
        try {
            if(isSignUp) await createUserWithEmailAndPassword(auth, e, p);
            else await signInWithEmailAndPassword(auth, e, p);
        } catch(err) { 
            alert("Error: " + err.message); 
        }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, async (user) => {
        const authPage = document.getElementById('p-auth');
        const nav = document.getElementById('nav-bar');
        
        if(user) {
            authPage.classList.remove('active');
            switchTab('add');
            nav.style.display = 'flex';
            
            const uDoc = await getDoc(doc(db, "users", user.uid));
            if(uDoc.exists()) {
                const d = uDoc.data();
                document.getElementById('u-name').value = d.fullname || "";
                document.getElementById('u-comp').value = d.company || "";
                document.getElementById('display-name').innerText = d.fullname || "User";
                document.getElementById('display-comp').innerText = d.company || "Company";
            }
            loadLogs();
        } else {
            authPage.classList.add('active');
            document.getElementById('p-add').classList.remove('active');
            document.getElementById('p-rep').classList.remove('active');
            nav.style.display = 'none';
        }
    });

    // --- Core Functions ---
    window.switchTab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-'+t).classList.add('active');
        document.getElementById('t-'+t).classList.add('active');
    };

    window.saveWork = async () => {
        const n = document.getElementById('u-name').value, c = document.getElementById('u-comp').value, d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!n || !d || !h) return alert("Fill Name, Date and Hours");
        
        await setDoc(doc(db, "users", auth.currentUser.uid), { fullname: n, company: c }, { merge: true });
        await setDoc(doc(db, "workLogs", `${auth.currentUser.uid}_${d}`), { 
            uid: auth.currentUser.uid, fullname: n, company: c, date: d, hours: parseFloat(h), month: d.slice(0, 7) 
        });
        alert("Success! ✅"); 
        switchTab('rep');
    };

    window.loadLogs = () => {
        const m = document.getElementById('month-filter').value || new Date().toISOString().slice(0, 7);
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), where("month", "==", m));
        
        onSnapshot(q, (snap) => {
            const list = document.getElementById('logs-list'); list.innerHTML = ""; let tot = 0; cachedLogs = [];
            snap.forEach(d => {
                const data = d.data(); tot += data.hours;
                cachedLogs.push([data.date, data.hours.toFixed(1)]);
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #222;">
                    <span>${data.date}</span><b>${data.hours}h</b>
                </div>`;
            });
            document.getElementById('total-val').innerText = tot.toFixed(1);
            cachedLogs.sort((a,b) => new Date(a[0]) - new Date(b[0]));
        });
    };

    // --- PDF Sharing ---
    window.generateAndSharePDF = async () => {
        if(cachedLogs.length === 0) return alert("No data to export");
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        const monthVal = document.getElementById('month-filter').value || "Report";
        
        docPDF.setFontSize(20);
        docPDF.text("Monthly Work Report", 105, 20, null, null, "center");
        docPDF.setFontSize(12);
        docPDF.text(`Employee: ${document.getElementById('u-name').value}`, 20, 35);
        docPDF.text(`Total Hours: ${document.getElementById('total-val').innerText}`, 20, 42);

        docPDF.autoTable({
            startY: 50,
            head: [['Date', 'Hours']],
            body: cachedLogs,
            theme: 'striped'
        });

        const blob = docPDF.output('blob');
        const file = new File([blob], `Report_${monthVal}.pdf`, { type: "application/pdf" });
        if (navigator.share) await navigator.share({ files: [file], title: 'Work Report' });
        else docPDF.save(`Report_${monthVal}.pdf`);
    };
</script>
</body>
</html>
