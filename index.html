<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro v19</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 0; overflow: hidden; }
        
        /* ✨ خلفية v8 ثابتة */
        .v8-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1; }
        .ray { position: absolute; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.06), transparent); width: 1px; height: 100vh; animation: move 10s infinite linear; }
        @keyframes move { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

        .page { display: none; padding: 20px; min-height: 100vh; box-sizing: border-box; position: relative; z-index: 5; flex-direction: column; align-items: center; justify-content: center; }
        .page.active { display: flex; }
        
        .slim-card { 
            background: rgba(255, 255, 255, 0.03); 
            width: 100%; max-width: 330px; 
            padding: 25px; border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px);
        }

        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; font-size: 15px; box-sizing: border-box; }
        .btn { background: #fff; color: #000; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 8px; }

        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-item { color: #555; text-align: center; flex: 1; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #fff; }

        .sig { font-weight: bold; margin-top: 30px; font-size: 14px; text-transform: uppercase; opacity: 0.8; text-align: center; }
        .top-bar { position: fixed; top: 15px; right: 15px; z-index: 20; display: flex; gap: 10px; }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid #444; color: #fff; padding: 8px; border-radius: 8px; font-size: 12px; }
        .rtl { direction: rtl; text-align: right; }
    </style>
</head>
<body>

    <div class="v8-bg"><div class="ray" style="left:20%"></div><div class="ray" style="left:80%"></div></div>

    <div class="top-bar">
        <select class="lang-btn" id="lang-select" onchange="setLang(this.value)">
            <option value="it">IT 🇮🇹</option>
            <option value="en">EN 🇬🇧</option>
            <option value="ar">AR 🇪🇬</option>
        </select>
        <button class="lang-btn" onclick="logout()"><i class="fas fa-power-off"></i></button>
    </div>

    <div id="p-auth" class="page active">
        <div class="slim-card">
            <h1 style="text-align:center; font-weight:200;">WORKTIME</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="handleAuth()">LOGIN</button>
            <div class="sig">CREATED BY SHOUKIR ABDALLA</div>
        </div>
    </div>

    <div id="p-add" class="page">
        <div class="slim-card">
            <h2 id="l-add" style="text-align:center; font-size:18px;">ADD HOURS</h2>
            <input type="text" id="u-name" placeholder="Name">
            <input type="text" id="u-comp" placeholder="Company">
            <input type="date" id="w-date">
            <input type="text" id="w-loc" placeholder="Location">
            <input type="number" step="0.5" id="w-hrs" placeholder="Hours">
            <textarea id="w-note" placeholder="Notes" rows="2"></textarea>
            <button class="btn" onclick="saveWork()" id="l-save">SAVE ✅</button>
        </div>
        <div class="sig">CREATED BY SHOUKIR ABDALLA</div>
    </div>

    <div id="p-rep" class="page">
        <div class="slim-card" style="max-width: 350px;">
            <h2 id="l-rep" style="text-align:center; font-size:18px;">REPORT</h2>
            <input type="month" id="month-filter" onchange="loadLogs()">
            <div id="logs-list" style="max-height: 200px; overflow-y: auto; margin: 15px 0; border-top:1px solid #222;"></div>
            <div style="text-align: center; margin-bottom:10px;">
                <small id="l-tot">TOTAL</small><br>
                <b id="total-val" style="font-size: 35px;">0.0</b>
            </div>
            <button class="btn" onclick="generateAndSharePDF()">SHARE PDF <i class="fas fa-share-nodes"></i></button>
        </div>
        <div class="sig">CREATED BY SHOUKIR ABDALLA</div>
    </div>

    <nav id="nav-bar" class="nav">
        <div class="nav-item active" id="t-add" onclick="switchTab('add')"><i class="fas fa-plus"></i><br>ADD</div>
        <div class="nav-item" id="t-rep" onclick="switchTab('rep')"><i class="fas fa-file-alt"></i><br>REPORT</div>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const langs = {
        it: { add: "REGISTRA ORE", rep: "RAPPORTO", save: "SALVA ✅", tot: "TOTALE ORE", months: ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"] },
        en: { add: "ADD HOURS", rep: "REPORT", save: "SAVE ✅", tot: "TOTAL HOURS", months: ["January","February","March","April","May","June","July","August","September","October","November","December"] },
        ar: { add: "إضافة ساعات", rep: "التقرير", save: "حفظ ✅", tot: "إجمالي الساعات", months: ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"] }
    };

    let curL = 'it';
    window.setLang = (l) => {
        curL = l;
        document.body.className = l === 'ar' ? 'rtl' : '';
        document.getElementById('l-add').innerText = langs[l].add;
        document.getElementById('l-rep').innerText = langs[l].rep;
        document.getElementById('l-save').innerText = langs[l].save;
        document.getElementById('l-tot').innerText = langs[l].tot;
        loadLogs();
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            switchTab('add');
            document.getElementById('p-auth').classList.remove('active');
            document.getElementById('nav-bar').style.display = 'flex';
            const u = await getDoc(doc(db, "users", user.uid));
            if(u.exists()) {
                document.getElementById('u-name').value = u.data().fullname || "";
                document.getElementById('u-comp').value = u.data().company || "";
            }
            loadLogs();
        } else {
            document.getElementById('p-auth').classList.add('active');
            document.getElementById('nav-bar').style.display = 'none';
        }
    });

    window.handleAuth = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert("Error"); }
    };

    window.logout = () => signOut(auth);

    window.saveWork = async () => {
        const d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!d || !h) return alert("Fill all fields");
        await setDoc(doc(db, "workLogs", `${auth.currentUser.uid}_${d}`), {
            uid: auth.currentUser.uid, date: d, hours: parseFloat(h),
            location: document.getElementById('w-loc').value,
            note: document.getElementById('w-note').value,
            month: d.slice(0,7)
        }, {merge: true});
        alert("Saved! ✅"); switchTab('rep');
    };

    window.del = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "workLogs", id)); };

    let cached = [];
    window.loadLogs = () => {
        const m = document.getElementById('month-filter').value || new Date().toISOString().slice(0,7);
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), where("month", "==", m));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('logs-list'); list.innerHTML = ""; let tot = 0; cached = [];
            snap.forEach(d => {
                const data = d.data(); tot += data.hours;
                cached.push([data.date, data.location || "-", data.note || "-", data.hours.toFixed(1)]);
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #111;">
                    <span>${data.date}</span><b>${data.hours}h</b>
                    <i class="fas fa-trash" style="color:#ff4444" onclick="del('${d.id}')"></i>
                </div>`;
            });
            document.getElementById('total-val').innerText = tot.toFixed(1);
            cached.sort((a,b) => new Date(a[0]) - new Date(b[0]));
        });
    };

    // معالجة العربي
    const fixAr = (t) => {
        if (!/[\u0600-\u06FF]/.test(t)) return t;
        return t.split(' ').map(w => w.split('').reverse().join('')).reverse().join('  ');
    };

    window.generateAndSharePDF = async () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const mVal = document.getElementById('month-filter').value || "2026-03";
        const mName = langs[curL].months[parseInt(mVal.split('-')[1])-1];

        doc.setFillColor(0, 123, 255); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255,255,255); doc.setFontSize(22);
        doc.text(`${mName.toUpperCase()} ${mVal.split('-')[0]}`, 105, 25, null, null, "center");

        doc.setTextColor(0,0,0); doc.setFontSize(14);
        doc.text(`Employee: ${document.getElementById('u-name').value}`, 15, 55);
        doc.text(`Company: ${document.getElementById('u-comp').value}`, 15, 63);

        const body = cached.map(r => [r[0], r[1], fixAr(r[2]), r[3]]);
        doc.autoTable({ startY: 75, head: [['Date', 'Location', 'Notes', 'Hrs']], body: body, theme: 'grid', headStyles: { fillColor: [0, 123, 255] } });

        doc.setFontSize(18); doc.setTextColor(0, 123, 255);
        doc.text(`TOTAL: ${document.getElementById('total-val').innerText} HRS`, 200, doc.lastAutoTable.finalY + 20, null, null, "right");
        
        doc.setFontSize(14); doc.setTextColor(150);
        doc.text("CREATED BY SHOUKIR ABDALLA", 105, 285, null, null, "center");

        // رجوع وظيفة الشير الأصلية
        const pdfOutput = doc.output('blob');
        const file = new File([pdfOutput], `Report_${mName}.pdf`, { type: 'application/pdf' });
        if (navigator.share) {
            try { await navigator.share({ files: [file], title: 'Work Report' }); }
            catch (e) { doc.save(`Report_${mName}.pdf`); }
        } else {
            doc.save(`Report_${mName}.pdf`);
        }
    };

    window.switchTab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-'+t).classList.add('active');
        document.getElementById('t-'+t).classList.add('active');
    };
</script>
</body>
</html>
