<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Aurora Gold</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { 
            background: linear-gradient(-45deg, #0a0a1a, #1a1a3a, #000000);
            background-size: 400% 400%;
            animation: aurora 10s ease infinite;
            color: #fff; height: 100vh; overflow: hidden;
        }
        @keyframes aurora { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .page { display: none; height: 100vh; padding: 20px; position: relative; z-index: 10; flex-direction: column; align-items: center; justify-content: center; }
        .page.active { display: flex; }

        .liquid-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 360px;
        }

        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 20px; letter-spacing: 2px; }

        .f-input {
            width: 100%; padding: 14px; margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: #fff;
            font-size: 15px; outline: none;
        }

        .main-btn {
            background: #fff; color: #000;
            padding: 16px; border-radius: 15px;
            border: none; font-weight: bold;
            cursor: pointer; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        /* Dock Navigation */
        .dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            padding: 10px 30px; border-radius: 25px; display: flex; gap: 40px;
            border: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        .dock-item { font-size: 20px; color: rgba(255,255,255,0.3); cursor: pointer; }
        .dock-item.active { color: #fff; }

        .report-item {
            background: rgba(255,255,255,0.03);
            margin-bottom: 10px; padding: 15px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); position: relative;
        }
        
        .total-box { text-align: center; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
        .sig { font-size: 10px; opacity: 0.3; text-align: center; margin-top: 20px; letter-spacing: 3px; }
        .logout-btn { position: fixed; top: 20px; right: 20px; z-index: 20; color: #fff; background: none; border: none; font-size: 20px; }
    </style>
</head>
<body>

    <button class="logout-btn" onclick="logout()"><i class="fas fa-power-off"></i></button>

    <div id="p-auth" class="page active">
        <div class="liquid-card">
            <h1>LOGIN</h1>
            <input type="email" id="email" class="f-input" placeholder="Email">
            <input type="password" id="pass" class="f-input" placeholder="Password">
            <button class="main-btn" onclick="handleAuth()">ENTRA</button>
        </div>
        <div class="sig">CREATED BY SHOUKIR ABDALLA</div>
    </div>

    <div id="p-add" class="page">
        <div class="liquid-card">
            <h1>REGISTRA ORE</h1>
            <input type="text" id="u-name" class="f-input" placeholder="Nome">
            <input type="text" id="u-comp" class="f-input" placeholder="Ditta">
            <input type="date" id="w-date" class="f-input">
            <input type="text" id="w-loc" class="f-input" placeholder="Luogo">
            <input type="number" id="w-hrs" class="f-input" placeholder="Ore">
            <textarea id="w-note" class="f-input" placeholder="Note" rows="2"></textarea>
            <button class="main-btn" onclick="saveWork()">SALVA ✅</button>
        </div>
        <div class="sig">CREATED BY SHOUKIR ABDALLA</div>
    </div>

    <div id="p-rep" class="page" style="justify-content: flex-start; padding-top: 70px;">
        <div class="liquid-card">
            <h1>RAPPORTO</h1>
            <input type="month" id="month-filter" class="f-input" onchange="loadLogs()">
            
            <div id="logs-list" style="max-height: 250px; overflow-y: auto; margin-bottom: 10px;"></div>

            <div class="total-box">
                <small>TOTALE ORE</small>
                <h2 id="total-val">0.0</h2>
            </div>
            
            <button class="main-btn" onclick="sharePDF()" style="margin-top: 10px;">PDF REPORT <i class="fas fa-file-pdf"></i></button>
        </div>
        <div class="sig">CREATED BY SHOUKIR ABDALLA</div>
    </div>

    <nav id="nav-bar" class="dock" style="display:none;">
        <div class="dock-item active" id="t-add" onclick="switchTab('add')"><i class="fas fa-plus"></i></div>
        <div class="dock-item" id="t-rep" onclick="switchTab('rep')"><i class="fas fa-list-ul"></i></div>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I", authDomain: "workapp-d34e0.firebaseapp.com", projectId: "workapp-d34e0", storageBucket: "workapp-d34e0.firebasestorage.app", messagingSenderId: "687874876802", appId: "1:687874876802:web:06e2e4e6030233cd579b9b" };
    const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            switchTab('add'); document.getElementById('p-auth').classList.remove('active');
            document.getElementById('nav-bar').style.display = 'flex';
            const u = await getDoc(doc(db, "users", user.uid));
            if(u.exists()) { 
                document.getElementById('u-name').value = u.data().fullname || ""; 
                document.getElementById('u-comp').value = u.data().company || ""; 
            }
            loadLogs();
        } else { 
            document.getElementById('p-auth').classList.add('active'); 
            document.getElementById('nav-bar').style.display = 'none'; 
        }
    });

    window.handleAuth = async () => { 
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert("Errore Login"); } 
    };

    window.logout = () => signOut(auth);

    window.saveWork = async () => {
        const d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!d || !h) return alert("Mancano dati!");
        await setDoc(doc(db, "workLogs", `${auth.currentUser.uid}_${d}`), { 
            uid: auth.currentUser.uid, date: d, hours: parseFloat(h), 
            location: document.getElementById('w-loc').value, 
            note: document.getElementById('w-note').value, 
            month: d.slice(0,7) 
        }, {merge:true});
        alert("Salvato! ✅"); switchTab('rep');
    };

    window.del = async (id) => { if(confirm("Eliminare riga?")) await deleteDoc(doc(db, "workLogs", id)); };

    let cachedData = [];
    window.loadLogs = () => {
        const m = document.getElementById('month-filter').value || new Date().toISOString().slice(0,7);
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), where("month", "==", m));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('logs-list'); list.innerHTML = ""; let tot = 0; cachedData = [];
            snap.forEach(d => {
                const data = d.data(); tot += data.hours;
                cachedData.push([data.date, data.location || "-", data.note || "-", data.hours.toFixed(1)]);
                list.innerHTML += `
                <div class="report-item">
                    <div style="display:flex; justify-content:space-between"><b>${data.date}</b> <span>${data.hours}h</span></div>
                    <div style="font-size:12px; opacity:0.6; margin-top:5px;">${data.location} | ${data.note}</div>
                    <i class="fas fa-trash-alt" style="position:absolute; top:15px; right:15px; color:red; cursor:pointer;" onclick="del('${d.id}')"></i>
                </div>`;
            });
            document.getElementById('total-val').innerText = tot.toFixed(1);
            cachedData.sort((a,b) => new Date(a[0]) - new Date(b[0]));
        });
    };

    window.sharePDF = async () => {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const mVal = document.getElementById('month-filter').value;
        doc.setFontSize(20); doc.text("RAPPORTO ORE", 105, 20, null, null, "center");
        doc.setFontSize(12); doc.text(`Dipendente: ${document.getElementById('u-name').value}`, 15, 35);
        doc.text(`Mese: ${mVal}`, 15, 42);
        
        doc.autoTable({ 
            startY: 50, head: [['Data', 'Luogo', 'Note', 'Ore']], body: cachedData,
            theme: 'grid', headStyles: { fillColor: [0, 0, 0] }
        });
        
        doc.text(`TOTALE: ${document.getElementById('total-val').innerText} ORE`, 15, doc.lastAutoTable.finalY + 15);
        doc.setFontSize(10); doc.text("CREATED BY SHOUKIR ABDALLA", 105, 285, null, null, "center");
        
        const blob = doc.output('blob'); const file = new File([blob], `Report.pdf`, { type: 'application/pdf' });
        if (navigator.share) await navigator.share({ files: [file] }); else doc.save(`Report.pdf`);
    };

    window.switchTab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.dock-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-'+t).classList.add('active'); 
        document.getElementById('t-'+t).classList.add('active');
    };
</script>
</body>
</html>
