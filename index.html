<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro v8.1 - Fixed</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        /* --- الأساسيات --- */
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; padding: 0; overflow-x: hidden; }
        .page { display: none; padding: 20px; position: relative; z-index: 5; min-height: 100vh; box-sizing: border-box; }
        .page.active { display: block; }
        
        /* --- الساعة الخلفية --- */
        .clock-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 0; }
        .clock-face { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; opacity: 0.3; border: 2px solid #333; border-radius: 50%; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; background: #fff; border-radius: 10px; }
        .hour { width: 6px; height: 60px; }
        .minute { width: 4px; height: 90px; }
        .second { width: 2px; height: 100px; background: #ff4444; }

        /* --- THEME PART (Inspired by your image) --- */
        .card {
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 60px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05); /* نيون خفيف */
        }
        
        input, textarea {
            width: 100%; padding: 15px; margin: 10px 0;
            background: rgba(255,255,255,0.05); border: 1px solid #333;
            color: #fff; border-radius: 12px; outline: none;
        }

        .btn {
            background: #fff; color: #000; border: none; padding: 18px;
            width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        /* Navigation */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); display: none; padding: 15px 0; border-top: 1px solid #222; z-index: 100; justify-content: space-around; }
        .nav-item { color: #555; text-align: center; flex: 1; cursor: pointer; font-size: 12px; }
        .nav-item.active { color: #fff; text-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>

    <div class="clock-bg" id="bg-clock">
        <div class="clock-face">
            <div class="hand hour" id="hour-hand"></div>
            <div class="hand minute" id="min-hand"></div>
            <div class="hand second" id="sec-hand"></div>
        </div>
    </div>

    <div id="p-auth" class="page active">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:80vh;">
            <h1 style="text-shadow: 0 0 15px #fff; font-weight: 200;">WORKTIME</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="handleAuth()">LOGIN</button>
            <p onclick="toggleMode()" id="toggle-txt" style="color:#666; margin-top:20px; cursor:pointer;">Create Account</p>
        </div>
    </div>

    <div id="p-add" class="page">
        <div class="card">
            <div style="display:flex; justify-content:space-between;">
                <h2>LOG SESSION</h2>
                <button onclick="logout()" style="background:none; border:1px solid #444; color:#888; border-radius:8px;">Logout</button>
            </div>
            <input type="text" id="u-name" placeholder="Name">
            <input type="text" id="u-comp" placeholder="Company">
            <input type="date" id="w-date">
            <input type="number" id="w-hrs" placeholder="Hours">
            <button class="btn" onclick="saveWork()">SAVE ✅</button>
        </div>
    </div>

    <div id="p-rep" class="page">
        <div class="card">
            <h2>REPORT</h2>
            <input type="month" id="month-filter" onchange="loadLogs()">
            <div id="logs-list" style="margin: 20px 0;"></div>
            <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; text-align:center;">
                TOTAL: <b id="total-val" style="font-size:30px;">0.0</b>
            </div>
            <button class="btn" style="margin-top:10px;" onclick="generateAndSharePDF()">SHARE PDF</button>
        </div>
    </div>

    <nav id="nav-bar" class="nav">
        <div class="nav-item active" id="t-add" onclick="switchTab('add')"><i class="fas fa-plus"></i><br>Add</div>
        <div class="nav-item" id="t-rep" onclick="switchTab('rep')"><i class="fas fa-file"></i><br>Report</div>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isSignUp = false;
    let cachedLogs = [];

    // Clock
    setInterval(() => {
        const d = new Date();
        document.getElementById('sec-hand').style.transform = `rotate(${d.getSeconds()*6}deg)`;
        document.getElementById('min-hand').style.transform = `rotate(${d.getMinutes()*6}deg)`;
        document.getElementById('hour-hand').style.transform = `rotate(${(d.getHours()%12)*30}deg)`;
    }, 1000);

    window.toggleMode = () => {
        isSignUp = !isSignUp;
        document.querySelector('#p-auth .btn').innerText = isSignUp ? "REGISTER" : "LOGIN";
    };

    window.handleAuth = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try {
            if(isSignUp) await createUserWithEmailAndPassword(auth, e, p);
            else await signInWithEmailAndPassword(auth, e, p);
        } catch(err) { alert(err.message); }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            document.getElementById('p-auth').classList.remove('active');
            document.getElementById('p-add').classList.add('active');
            document.getElementById('nav-bar').style.display = 'flex';
            document.getElementById('bg-clock').style.display = 'none';
            const u = await getDoc(doc(db, "users", user.uid));
            if(u.exists()) {
                document.getElementById('u-name').value = u.data().fullname || "";
                document.getElementById('u-comp').value = u.data().company || "";
            }
            loadLogs();
        } else {
            document.getElementById('p-auth').classList.add('active');
            document.getElementById('nav-bar').style.display = 'none';
            document.getElementById('bg-clock').style.display = 'block';
        }
    });

    window.switchTab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-'+t).classList.add('active');
        document.getElementById('t-'+t).classList.add('active');
    };

    window.saveWork = async () => {
        const n = document.getElementById('u-name').value, d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!n || !d || !h) return alert("Fill all fields");
        await setDoc(doc(db, "users", auth.currentUser.uid), { fullname: n, company: document.getElementById('u-comp').value }, { merge: true });
        await setDoc(doc(db, "workLogs", `${auth.currentUser.uid}_${d}`), { uid: auth.currentUser.uid, date: d, hours: parseFloat(h), month: d.slice(0, 7) });
        alert("Saved!"); switchTab('rep');
    };

    window.loadLogs = () => {
        const m = document.getElementById('month-filter').value || new Date().toISOString().slice(0, 7);
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), where("month", "==", m));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('logs-list'); list.innerHTML = ""; let tot = 0; cachedLogs = [];
            snap.forEach(d => {
                const data = d.data(); tot += data.hours;
                cachedLogs.push([data.date, data.hours.toFixed(1)]);
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222;">${data.date} <b>${data.hours}h</b></div>`;
            });
            document.getElementById('total-val').innerText = tot.toFixed(1);
        });
    };

    window.generateAndSharePDF = async () => {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        docPDF.text("Work Report", 20, 20);
        docPDF.autoTable({ head: [['Date', 'Hours']], body: cachedLogs });
        docPDF.save("Report.pdf");
    };
</script>
</body>
</html>
