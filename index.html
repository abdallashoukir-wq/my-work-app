<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Visionary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; padding: 0; overflow: hidden; }
        
        /* الخلفية v8 - محرك الخيال */
        .v8-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #111 0%, #000 100%); z-index: 1; }
        .ray { position: absolute; background: linear-gradient(to bottom, transparent, rgba(0, 150, 255, 0.1), transparent); width: 2px; height: 100vh; animation: move 8s infinite linear; filter: blur(1px); }
        @keyframes move { 0% { transform: translateY(-100%); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(100%); opacity: 0; } }

        .page { display: none; padding: 25px; min-height: 100vh; box-sizing: border-box; position: relative; z-index: 5; flex-direction: column; align-items: center; justify-content: center; }
        .page.active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* الكارت الزجاجي */
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            width: 100%; max-width: 350px; 
            padding: 30px; border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(25px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        h2 { font-weight: 300; letter-spacing: 3px; margin-bottom: 25px; text-transform: uppercase; font-size: 1.2rem; text-align: center; color: rgba(255,255,255,0.9); }

        .input-group { position: relative; margin-bottom: 15px; width: 100%; }
        input, textarea, select { 
            width: 100%; padding: 16px; background: rgba(0, 0, 0, 0.2); 
            border: 1px solid rgba(255,255,255,0.1); color: #fff; 
            border-radius: 15px; font-size: 15px; box-sizing: border-box; 
            outline: none; transition: 0.4s;
        }
        input:focus { border-color: rgba(0, 150, 255, 0.5); box-shadow: 0 0 15px rgba(0, 150, 255, 0.1); }
        
        .action-btn { 
            background: linear-gradient(135deg, #fff 0%, #ddd 100%); color: #000; 
            border: none; padding: 18px; width: 100%; border-radius: 15px; 
            font-weight: 600; cursor: pointer; margin-top: 10px; 
            display: flex; justify-content: center; align-items: center; gap: 12px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .action-btn:active { transform: scale(0.96); }

        /* نفيجيشن مودرن */
        .nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 300px; background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 10px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-item { color: #666; padding: 10px 20px; border-radius: 20px; transition: 0.4s; cursor: pointer; text-align: center; }
        .nav-item.active { color: #fff; background: rgba(255,255,255,0.1); }
        .nav-item i { font-size: 1.2rem; }

        /* تصميم التايم لاين في الريبورت */
        .timeline-item { 
            border-left: 2px solid rgba(0, 150, 255, 0.3); 
            padding-left: 20px; margin-bottom: 25px; position: relative; 
        }
        .timeline-item::before { 
            content: ''; position: absolute; left: -7px; top: 0; 
            width: 12px; height: 12px; background: #0096ff; border-radius: 50%; 
            box-shadow: 0 0 10px #0096ff;
        }
        .item-card { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        
        .total-display { font-size: 2.5rem; font-weight: 200; color: #fff; margin: 10px 0; }
        .sig { font-size: 10px; opacity: 0.4; letter-spacing: 4px; margin-top: 40px; text-align: center; }
        
        .rtl { direction: rtl; text-align: right; }
    </style>
</head>
<body>

    <div class="v8-bg">
        <div class="ray" style="left:15%"></div>
        <div class="ray" style="left:50%; animation-delay: 2s;"></div>
        <div class="ray" style="left:85%; animation-delay: 4s;"></div>
    </div>

    <div id="p-auth" class="page active">
        <div class="glass-card">
            <h2>Access Portal</h2>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Secret Key">
            <button class="action-btn" onclick="handleAuth()">UNFOLD <i class="fas fa-unlock-alt"></i></button>
        </div>
        <div class="sig">SHOUKIR ABDALLA STUDIO</div>
    </div>

    <div id="p-add" class="page">
        <div class="glass-card">
            <h2 id="l-add">LOG SESSION</h2>
            <input type="text" id="u-name" placeholder="Employee Name">
            <input type="text" id="u-comp" placeholder="Company Unit">
            <input type="date" id="w-date">
            <input type="text" id="w-loc" placeholder="Location/Site">
            <input type="number" step="0.5" id="w-hrs" placeholder="Work Hours">
            <textarea id="w-note" placeholder="Observations/Notes" rows="2"></textarea>
            <button class="action-btn" onclick="saveWork()">REGISTER DATA <i class="fas fa-bolt"></i></button>
        </div>
        <div class="sig">SHOUKIR ABDALLA STUDIO</div>
    </div>

    <div id="p-rep" class="page" style="justify-content: flex-start; padding-top: 60px;">
        <div class="glass-card">
            <h2 id="l-rep">ANALYTICS</h2>
            <input type="month" id="month-filter" onchange="loadLogs()">
            
            <div id="logs-list" style="max-height: 280px; overflow-y: auto; margin: 20px 0; padding-right: 10px;">
                </div>
            
            <div style="text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
                <div class="total-display" id="total-val">0.0</div>
                <small style="color:#555; letter-spacing: 2px;">ACCUMULATED HOURS</small>
            </div>
            <button class="action-btn" onclick="sharePDF()" style="margin-top: 20px;">EXPORT PDF <i class="fas fa-file-export"></i></button>
        </div>
        <div class="sig">SHOUKIR ABDALLA STUDIO</div>
    </div>

    <nav id="nav-bar" class="nav" style="display:none;">
        <div class="nav-item active" id="t-add" onclick="switchTab('add')"><i class="fas fa-plus"></i></div>
        <div class="nav-item" id="t-rep" onclick="switchTab('rep')"><i class="fas fa-chart-pie"></i></div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-power-off"></i></div>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I", authDomain: "workapp-d34e0.firebaseapp.com", projectId: "workapp-d34e0", storageBucket: "workapp-d34e0.firebasestorage.app", messagingSenderId: "687874876802", appId: "1:687874876802:web:06e2e4e6030233cd579b9b" };
    const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            switchTab('add'); document.getElementById('p-auth').classList.remove('active');
            document.getElementById('nav-bar').style.display = 'flex';
            const u = await getDoc(doc(db, "users", user.uid));
            if(u.exists()) { document.getElementById('u-name').value = u.data().fullname || ""; document.getElementById('u-comp').value = u.data().company || ""; }
            loadLogs();
        } else { document.getElementById('p-auth').classList.add('active'); document.getElementById('nav-bar').style.display = 'none'; }
    });

    window.handleAuth = async () => { try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value); } catch(e) { alert("Access Error"); } };
    window.logout = () => signOut(auth);
    window.saveWork = async () => {
        const d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!d || !h) return alert("Fill session data");
        await setDoc(doc(db, "workLogs", `${auth.currentUser.uid}_${d}`), { uid: auth.currentUser.uid, date: d, hours: parseFloat(h), location: document.getElementById('w-loc').value, note: document.getElementById('w-note').value, month: d.slice(0,7) }, {merge:true});
        alert("Session Locked! ✅"); switchTab('rep');
    };
    window.del = async (id) => { if(confirm("Remove session?")) await deleteDoc(doc(db, "workLogs", id)); };

    let cached = [];
    window.loadLogs = () => {
        const m = document.getElementById('month-filter').value || new Date().toISOString().slice(0,7);
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), where("month", "==", m));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('logs-list'); list.innerHTML = ""; let tot = 0; cached = [];
            snap.forEach(d => {
                const data = d.data(); tot += data.hours; cached.push([data.date, data.location || "-", data.note || "-", data.hours.toFixed(1)]);
                list.innerHTML += `
                <div class="timeline-item">
                    <div class="item-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <span style="color:#0096ff; font-weight:bold;">${data.date}</span>
                            <span>${data.hours}h</span>
                        </div>
                        <div style="font-size:12px; color:#666;">
                            <i class="fas fa-location-arrow"></i> ${data.location || '-'}<br>
                            <i class="fas fa-quote-left"></i> ${data.note || '-'}
                        </div>
                        <i class="fas fa-times" style="color:rgba(255,0,0,0.3); position:absolute; top:15px; right:10px; cursor:pointer;" onclick="del('${d.id}')"></i>
                    </div>
                </div>`;
            });
            document.getElementById('total-val').innerText = tot.toFixed(1);
            cached.sort((a,b) => new Date(a[0]) - new Date(b[0]));
        });
    };

    const fixAr = (t) => { if (!/[\u0600-\u06FF]/.test(t)) return t; return t.split(' ').map(w => w.split('').reverse().join('')).reverse().join('  '); };

    window.sharePDF = async () => {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const mVal = document.getElementById('month-filter').value || "2026";
        doc.setFillColor(30, 30, 30); doc.rect(0, 0, 210, 50, 'F');
        doc.setTextColor(255); doc.setFontSize(24); doc.text(`WORK LOG: ${mVal}`, 15, 30);
        doc.setTextColor(150); doc.setFontSize(10); doc.text(`Generated by WorkTime Visionary`, 15, 40);
        doc.setTextColor(0); doc.setFontSize(14); doc.text(`Employee: ${document.getElementById('u-name').value}`, 15, 65);
        const body = cached.map(r => [r[0], r[1], fixAr(r[2]), r[3]]);
        doc.autoTable({ startY: 75, head: [['DATE', 'LOCATION', 'OBSERVATIONS', 'HRS']], body: body, headStyles: {fillColor: [30,30,30]} });
        doc.text(`TOTAL ACCUMULATED: ${document.getElementById('total-val').innerText} HRS`, 15, doc.lastAutoTable.finalY + 20);
        const blob = doc.output('blob'); const file = new File([blob], `Report.pdf`, { type: 'application/pdf' });
        if (navigator.share) await navigator.share({ files: [file] }); else doc.save(`Report.pdf`);
    };

    window.switchTab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-'+t).classList.add('active'); document.getElementById('t-'+t).classList.add('active');
    };
</script>
</body>
</html>
