<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro v33</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { 
            background: linear-gradient(-45deg, #0a0a1a, #1a1a3a, #000000);
            background-size: 400% 400%; animation: aurora 15s ease infinite;
            color: #fff; height: 100vh; overflow: hidden;
        }
        @keyframes aurora { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .page { display: none; height: 100vh; padding: 20px; position: relative; z-index: 10; flex-direction: column; align-items: center; justify-content: center; }
        .page.active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .liquid-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.6rem; text-align: center; margin-bottom: 20px; letter-spacing: 3px; font-weight: 300; }

        .f-input {
            width: 100%; padding: 14px; margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; color: #fff; font-size: 15px; outline: none;
        }

        .main-btn {
            background: #fff; color: #000; padding: 16px; border-radius: 18px;
            border: none; font-weight: bold; cursor: pointer; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.3s;
        }

        #toast { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 12px 30px; border-radius: 50px;
            font-weight: bold; transition: 0.5s; z-index: 200;
        }

        .dock {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(20px);
            padding: 12px 40px; border-radius: 35px; display: flex; gap: 40px;
            border: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        .dock-item { font-size: 22px; color: rgba(255,255,255,0.3); cursor: pointer; }
        .dock-item.active { color: #fff; text-shadow: 0 0 10px #fff; }

        .report-item {
            background: rgba(255,255,255,0.04); margin-bottom: 12px; padding: 18px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); position: relative;
        }
        .actions { display: flex; gap: 15px; position: absolute; top: 18px; right: 15px; }

        .total-section { text-align: center; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .money-tag { color: #44ff44; font-size: 18px; font-weight: bold; margin-top: 5px; }
        .sig { font-size: 9px; opacity: 0.3; text-align: center; margin-top: 25px; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div id="toast">Operazione completata!</div>

    <div id="p-auth" class="page active">
        <div class="liquid-card">
            <h1>WORKTIME PRO</h1>
            <input type="email" id="email" class="f-input" placeholder="Email">
            <input type="password" id="pass" class="f-input" placeholder="Password">
            <button class="main-btn" onclick="handleAuth('login')">LOGIN</button>
            <button class="main-btn" style="background:transparent; color:#fff; border:1px solid #444; margin-top:10px" onclick="handleAuth('signup')">REGISTRATI</button>
        </div>
    </div>

    <div id="p-add" class="page">
        <div class="liquid-card">
            <h1 id="form-title">NUOVA SESSIONE</h1>
            <input type="text" id="u-name" class="f-input" placeholder="Nome">
            <input type="text" id="u-comp" class="f-input" placeholder="Ditta">
            <input type="number" id="u-rate" class="f-input" placeholder="Paga Oraria (€)">
            <hr style="opacity:0.1; margin-bottom:12px">
            <input type="date" id="w-date" class="f-input">
            <input type="text" id="w-loc" class="f-input" placeholder="Luogo">
            <input type="number" step="0.5" id="w-hrs" class="f-input" placeholder="Ore">
            <textarea id="w-note" class="f-input" placeholder="Note (Arabo OK)" rows="2"></textarea>
            <button class="main-btn" onclick="saveWork()">SALVA ✅</button>
        </div>
    </div>

    <div id="p-rep" class="page" style="justify-content: flex-start; padding-top: 80px;">
        <div class="liquid-card" style="display:flex; flex-direction:column; max-height: 80vh;">
            <h1>ARCHIVIO</h1>
            <input type="month" id="month-filter" class="f-input" onchange="loadLogs()">
            <div id="logs-list" style="flex:1; overflow-y: auto; margin-bottom: 15px;"></div>
            <div class="total-section">
                <h2 id="total-val">0.0</h2><small>ORE TOTALI</small>
                <div id="total-money" class="money-tag">€ 0.00</div>
            </div>
            <button class="main-btn" onclick="buildNewPDF()">EXPORT PDF <i class="fas fa-file-pdf"></i></button>
        </div>
    </div>

    <nav id="nav-bar" class="dock" style="display:none;">
        <div class="dock-item active" id="t-add" onclick="switchTab('add')"><i class="fas fa-plus"></i></div>
        <div class="dock-item" id="t-rep" onclick="switchTab('rep')"><i class="fas fa-wallet"></i></div>
        <div class="dock-item" onclick="logout()"><i class="fas fa-power-off"></i></div>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I", authDomain: "workapp-d34e0.firebaseapp.com", projectId: "workapp-d34e0", storageBucket: "workapp-d34e0.firebasestorage.app", messagingSenderId: "687874876802", appId: "1:687874876802:web:06e2e4e6030233cd579b9b" };
    const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

    let editId = null; let cached = [];

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            switchTab('add'); document.getElementById('p-auth').classList.remove('active');
            document.getElementById('nav-bar').style.display = 'flex';
            const u = await getDoc(doc(db, "users", user.uid));
            if(u.exists()) { 
                document.getElementById('u-name').value = u.data().fullname || ""; 
                document.getElementById('u-comp').value = u.data().company || ""; 
                document.getElementById('u-rate').value = u.data().rate || ""; 
            }
            loadLogs();
        } else { document.getElementById('p-auth').classList.add('active'); document.getElementById('nav-bar').style.display = 'none'; }
    });

    window.showToast = (m) => { const t = document.getElementById('toast'); t.innerText = m; t.style.top = "30px"; setTimeout(() => t.style.top = "-100px", 2500); };
    
    window.handleAuth = async (t) => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { 
            if(t==='login') await signInWithEmailAndPassword(auth,e,p); 
            else {
                const res = await createUserWithEmailAndPassword(auth,e,p);
                await setDoc(doc(db, "users", res.user.uid), {fullname:"", company:"", rate:0});
                // إصلاح التسجيل: الدخول المباشر بعد النجاح
                showToast("Account Creato!");
            }
        } catch(err) { showToast("Errore: " + err.message); }
    };

    window.logout = () => signOut(auth);
    window.switchTab = (t) => { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.querySelectorAll('.dock-item').forEach(d=>d.classList.remove('active')); document.getElementById('p-'+t).classList.add('active'); document.getElementById('t-'+t).classList.add('active'); };

    window.saveWork = async () => {
        const d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!d || !h) return showToast("Dati mancanti!");
        const n = document.getElementById('u-name').value, c = document.getElementById('u-comp').value, r = document.getElementById('u-rate').value;
        await setDoc(doc(db, "users", auth.currentUser.uid), { fullname: n, company: c, rate: parseFloat(r) || 0 }, {merge:true});
        const id = editId || `${auth.currentUser.uid}_${d}`;
        await setDoc(doc(db, "workLogs", id), { uid: auth.currentUser.uid, date: d, hours: parseFloat(h), location: document.getElementById('w-loc').value, note: document.getElementById('w-note').value, month: d.slice(0,7) }, {merge:true});
        showToast("Salvato!"); resetForm(); switchTab('rep');
    };

    window.resetForm = () => { editId = null; document.getElementById('form-title').innerText = "NUOVA SESSIONE"; document.getElementById('w-date').value = ""; document.getElementById('w-hrs').value = ""; document.getElementById('w-loc').value = ""; document.getElementById('w-note').value = ""; };
    window.editLog = (id,d,l,n,h) => { editId = id; switchTab('add'); document.getElementById('form-title').innerText = "MODIFICA"; document.getElementById('w-date').value=d; document.getElementById('w-loc').value=l; document.getElementById('w-note').value=n; document.getElementById('w-hrs').value=h; };
    window.del = async (id) => { if(confirm("Eliminare?")) await deleteDoc(doc(db, "workLogs", id)); };

    window.loadLogs = () => {
        const m = document.getElementById('month-filter').value || new Date().toISOString().slice(0,7);
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), where("month", "==", m));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('logs-list'); list.innerHTML = ""; let tot = 0; cached = [];
            snap.forEach(d => { const data = d.data(); tot += data.hours; cached.push(data); list.innerHTML += `<div class="report-item"><b>${data.date}</b> - ${data.hours}h<br><small>${data.location} | ${data.note}</small><div class="actions" style="position:absolute; top:18px; right:15px; display:flex; gap:15px;"><i class="fas fa-edit" onclick="editLog('${d.id}','${data.date}','${data.location}','${data.note}','${data.hours}')"></i><i class="fas fa-trash" style="color:red" onclick="del('${d.id}')"></i></div></div>`; });
            document.getElementById('total-val').innerText = tot.toFixed(1);
            const rate = parseFloat(document.getElementById('u-rate').value) || 0;
            document.getElementById('total-money').innerText = "€ " + (tot * rate).toFixed(2);
            cached.sort((a,b) => new Date(a.date) - new Date(b.date));
        });
    };

    window.buildNewPDF = async () => {
        const { jsPDF } = window.jspdf; const pdf = new jsPDF();
        const name = document.getElementById('u-name').value; const comp = document.getElementById('u-comp').value; const m = document.getElementById('month-filter').value;
        pdf.setFontSize(22); pdf.text("RAPPORTO LAVORO", 105, 20, null, null, "center");
        pdf.setFontSize(12); pdf.text(`Dipendente: ${name}`, 15, 35); pdf.text(`Ditta: ${comp}`, 15, 42); pdf.text(`Periodo: ${m}`, 15, 49);
        const fixAr = (t) => { if (!t) return "-"; if (!/[\u0600-\u06FF]/.test(t)) return t; return t.split('').reverse().join(''); };
        const body = cached.map(i => [i.date, i.location || "-", fixAr(i.note), i.hours.toFixed(1)]);
        pdf.autoTable({ startY: 55, head: [['Data', 'Luogo', 'Note', 'Ore']], body: body, theme: 'grid', headStyles: { fillColor: [0, 0, 0] } });
        pdf.text(`TOTALE ORE: ${document.getElementById('total-val').innerText}`, 15, pdf.lastAutoTable.finalY + 15);
        pdf.text(`TOTALE PAGA: ${document.getElementById('total-money').innerText}`, 15, pdf.lastAutoTable.finalY + 22);
        const blob = pdf.output('blob'); const file = new File([blob], `Report.pdf`, { type: 'application/pdf' });
        if (navigator.share) await navigator.share({ files: [file] }); else pdf.save(`Report.pdf`);
    };
</script>
</body>
</html>
