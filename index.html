<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --primary: #00e676; --bg: #0d0d0d; --card: #1a1a1a; --text: #f5f5f5; --accent-blue: #007bff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        .page { display: none; padding: 20px; box-sizing: border-box; min-height: 100vh; }
        .page.active { display: block; }

        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #2a2a2a; max-width: 400px; margin: 0 auto 20px; }
        
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #252525; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; font-size: 16px; text-align: right; }
        .btn { background: var(--primary); color: #000; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; }
        .nav-item { color: #888; text-align: center; flex: 1; cursor: pointer; font-size: 0.8rem; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.3rem; display: block; }

        /* تنسيق التقرير ليشبه الصورة المرفقة */
        #pdf-content { background: white; color: #333; padding: 30px; border-radius: 10px; text-align: left; direction: ltr; }
        .report-header { text-align: center; color: var(--accent-blue); margin-bottom: 30px; }
        .info-row { margin-bottom: 8px; font-weight: bold; color: #555; }
        .info-row span { color: var(--accent-blue); }
        
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 10px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .report-table th { background: #f8f9fa; color: #999; padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.8rem; }
        .report-table td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; font-weight: bold; }
        
        .total-box { background: #f0f7ff; color: var(--accent-blue); padding: 20px; border-radius: 10px; text-align: center; margin-top: 25px; font-size: 1.2rem; font-weight: bold; border: 1px solid #d0e7ff; }
    </style>
</head>
<body>

    <div id="auth-page" class="page active">
        <div class="card" style="margin-top: 50px; text-align: center;">
            <i class="fas fa-user-circle" style="font-size: 4rem; color: var(--primary); margin-bottom: 15px;"></i>
            <h2>WorkTime Pro</h2>
            <input type="email" id="login-email" placeholder="البريد الإلكتروني">
            <input type="password" id="login-pass" placeholder="كلمة المرور">
            <button class="btn" onclick="handleAuth()">دخول</button>
            <p onclick="toggleMode()" id="mode-text" style="color:var(--primary); cursor:pointer; margin-top:15px; font-size: 0.9rem;">ليس لديك حساب؟ إنشاء حساب جديد</p>
        </div>
    </div>

    <div id="add-page" class="page">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0">إضافة ساعات العمل</h3>
                <i class="fas fa-sign-out-alt" onclick="logout()" style="color:#ff4444; cursor:pointer"></i>
            </div>
            
            <label style="font-size:0.85rem; color:var(--primary)">الاسم الكامل (للموظف):</label>
            <input type="text" id="user-fullname" placeholder="اكتب اسمك هنا ليظهر في التقرير">
            
            <hr style="border:0; border-top:1px solid #333; margin:15px 0;">

            <label style="font-size:0.85rem; color:#888;">اختر التاريخ:</label>
            <input type="date" id="work-date">
            <input type="number" id="work-hours" placeholder="عدد الساعات">
            <textarea id="work-note" placeholder="ملاحظة قصيرة..."></textarea>
            
            <button class="btn" onclick="saveWorkData()">حفظ العمل +</button>
        </div>
    </div>

    <div id="report-page" class="page" style="padding-bottom: 80px;">
        <div id="pdf-content">
            <div class="report-header">
                <h2 style="margin:0">Riepilogo Ore Mensili</h2>
                <p id="report-month-year" style="color:#777; margin:5px 0;"></p>
                <div style="width:100%; height:2px; background:var(--accent-blue); margin-top:15px;"></div>
            </div>

            <div class="info-row">Nome: <span id="display-name">---</span></div>
            <div class="info-row">Periodo: <span id="display-period">---</span></div>
            <div class="info-row">Giorni lavorati: <span id="display-days">0</span></div>

            <table class="report-table">
                <thead><tr><th>Data</th><th style="text-align:right">Ore</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>

            <div class="total-box">
                TOTALE ORE: <span id="total-hours-sum">0.0</span>
            </div>
            
            <p style="text-align:center; font-size:0.6rem; color:#ccc; margin-top:20px;">Generato con Ore Mensili App</p>
        </div>
        <div style="max-width:400px; margin: 20px auto;">
            <button class="btn" style="background:#007bff; color:white;" onclick="exportToPDF()">تحميل PDF للشركة <i class="fas fa-download"></i></button>
        </div>
    </div>

    <div id="footer-nav" class="bottom-nav" style="display:none;">
        <div class="nav-item active" id="n-add" onclick="switchTab('add')"><i class="fas fa-plus-circle"></i>إضافة</div>
        <div class="nav-item" id="n-report" onclick="switchTab('report')"><i class="fas fa-file-alt"></i>التقرير</div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isLogin = true;

    window.toggleMode = () => {
        isLogin = !isLogin;
        document.getElementById('mode-text').innerText = isLogin ? "ليس لديك حساب؟ إنشاء حساب جديد" : "لديك حساب؟ سجل دخولك";
    };

    window.handleAuth = async () => {
        const e = document.getElementById('login-email').value;
        const p = document.getElementById('login-pass').value;
        try {
            if(isLogin) await signInWithEmailAndPassword(auth, e, p);
            else await createUserWithEmailAndPassword(auth, e, p);
        } catch (err) { alert("خطأ: " + err.message); }
    };

    onAuthStateChanged(auth, async (user) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        if(user) {
            document.getElementById('add-page').classList.add('active');
            document.getElementById('footer-nav').style.display = 'flex';
            // جلب الاسم من Firebase لو موجود
            const uDoc = await getDoc(doc(db, "users", user.uid));
            if(uDoc.exists()) document.getElementById('user-fullname').value = uDoc.data().fullname || "";
        } else {
            document.getElementById('auth-page').classList.add('active');
            document.getElementById('footer-nav').style.display = 'none';
        }
    });

    window.switchTab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(t === 'add') {
            document.getElementById('add-page').classList.add('active');
            document.getElementById('n-add').classList.add('active');
        } else {
            document.getElementById('report-page').classList.add('active');
            document.getElementById('n-report').classList.add('active');
            renderReport();
        }
    };

    window.saveWorkData = async () => {
        const name = document.getElementById('user-fullname').value.trim();
        const date = document.getElementById('work-date').value;
        const hours = document.getElementById('work-hours').value;
        const note = document.getElementById('work-note').value;

        if(!name || !date || !hours) return alert("أكمل الاسم والتاريخ والساعات أولاً!");

        // حفظ الاسم في بروفايل المستخدم
        await setDoc(doc(db, "users", auth.currentUser.uid), { fullname: name });

        // منع تكرار التسجيل في نفس اليوم (تحديث السجل الموجود)
        const recordId = `${auth.currentUser.uid}_${date}`;
        await setDoc(doc(db, "workLogs", recordId), {
            uid: auth.currentUser.uid,
            date: date,
            hours: parseFloat(hours),
            note: note,
            ts: new Date()
        });

        alert("تم حفظ ساعات العمل بنجاح! ✅");
        switchTab('report');
    };

    async function renderReport() {
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), orderBy("date", "asc"));
        const snap = await getDocs(q);
        const tbody = document.getElementById('table-body');
        const name = document.getElementById('user-fullname').value;
        
        document.getElementById('display-name').innerText = name || "---";
        
        // حساب الشهر والسنة الحاليين للتقرير
        const now = new Date();
        const months = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        const periodText = `${months[now.getMonth()]} ${now.getFullYear()}`;
        document.getElementById('report-month-year').innerText = periodText;
        document.getElementById('display-period').innerText = periodText;

        tbody.innerHTML = "";
        let total = 0;
        let daysCount = 0;
        
        snap.forEach(d => {
            const data = d.data();
            total += data.hours;
            daysCount++;
            // تنسيق التاريخ ليصبح DD/MM/YYYY
            const dateParts = data.date.split('-');
            const formattedDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
            
            tbody.innerHTML += `<tr><td>${formattedDate}</td><td style="text-align:right">${data.hours.toFixed(1)}</td></tr>`;
        });
        
        document.getElementById('display-days').innerText = daysCount;
        document.getElementById('total-hours-sum').innerText = total.toFixed(1);
    }

    window.logout = () => signOut(auth);
    window.exportToPDF = () => {
        const element = document.getElementById('pdf-content');
        const opt = {
            margin: 0,
            filename: 'Riepilogo_Ore.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    };
</script>
</body>
</html>
