<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkApp Pro | نظام الحسابات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #00e676; --bg: #0a0a0a; --card: #161616; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 400px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        .btn { background: var(--primary); color: black; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .link { color: var(--primary); cursor: pointer; font-size: 0.9rem; text-decoration: underline; display: block; margin-top: 15px; text-align: center; }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size: 0.8rem; }
        th { color: var(--primary); border-bottom: 2px solid #333; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #222; text-align: center; }
    </style>
</head>
<body>

<div class="app">
    <div id="auth-screen" class="card">
        <h2 id="auth-title">تسجيل الدخول</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="btn" id="auth-btn">دخول</button>
        <span class="link" id="toggle-auth">ليس لديك حساب؟ إنشاء حساب جديد</span>
    </div>

    <div id="main-app" style="display:none">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 id="user-head">مرحباً</h3>
                <button onclick="logout()" style="background:none; border:none; color:#ff4444; cursor:pointer;">خروج</button>
            </div>
            <input type="date" id="work-date">
            <input type="number" id="work-hours" placeholder="عدد الساعات">
            <input type="text" id="work-note" placeholder="ملاحظة قصيرة">
            <button class="btn" onclick="saveData()">حفظ العمل +</button>
        </div>

        <div class="card" id="pdf-area">
            <h4>سجل ساعاتك الشخصي</h4>
            <table id="data-table">
                <thead><tr><th>التاريخ</th><th>ساعة</th><th>ملاحظة</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <button class="btn" style="background:#444; color:white" onclick="exportPDF()">تحميل PDF</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ضع هنا الـ Config الخاص بك من الصورة الأخيرة
    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0Dm...", 
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd..."
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isLoginMode = true;

    // تبديل بين دخول وإنشاء حساب
    document.getElementById('toggle-auth').onclick = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "تسجيل الدخول" : "إنشاء حساب جديد";
        document.getElementById('auth-btn').innerText = isLoginMode ? "دخول" : "تسجيل الحساب";
        document.getElementById('toggle-auth').innerText = isLoginMode ? "ليس لديك حساب؟ إنشاء حساب جديد" : "لديك حساب بالفعل؟ سجل دخولك";
    };

    // تنفيذ الدخول أو الإنشاء
    document.getElementById('auth-btn').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        try {
            if(isLoginMode) {
                await signInWithEmailAndPassword(auth, email, pass);
            } else {
                await createUserWithEmailAndPassword(auth, email, pass);
                alert("تم إنشاء الحساب بنجاح!");
            }
        } catch (e) { alert("خطأ: " + e.message); }
    };

    // مراقبة حالة المستخدم (هل هو داخل التطبيق أم لا)
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-head').innerText = "أهلاً " + user.email.split('@')[0];
            loadTable(user.uid);
        } else {
            document.getElementById('auth-screen').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    // حفظ البيانات مربوطة بـ UID المستخدم
    window.saveData = async () => {
        const user = auth.currentUser;
        const date = document.getElementById('work-date').value;
        const hours = parseFloat(document.getElementById('work-hours').value);
        const note = document.getElementById('work-note').value;

        if(!date || !hours) return alert("أكمل البيانات");

        await addDoc(collection(db, "workLogs"), {
            uid: user.uid,
            date, hours, note, createdAt: new Date()
        });
        loadTable(user.uid);
    };

    // جلب بيانات المستخدم الحالي فقط
    async function loadTable(uid) {
        const q = query(collection(db, "workLogs"), where("uid", "==", uid), orderBy("date", "desc"));
        const snap = await getDocs(q);
        const tbody = document.querySelector('#data-table tbody');
        tbody.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            tbody.innerHTML += `<tr><td>${d.date}</td><td>${d.hours}</td><td>${d.note}</td></tr>`;
        });
    }

    window.logout = () => signOut(auth);
    window.exportPDF = () => html2pdf().from(document.getElementById('pdf-area')).save('تقريري.pdf');

</script>
</body>
</html>
