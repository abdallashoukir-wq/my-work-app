<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Master v29</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; }
        
        /* تأثير الأورورا الخفيف */
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a3a 0%, #000 100%); z-index: 1; }

        .page { display: none; height: 100vh; padding: 20px; position: relative; z-index: 10; flex-direction: column; align-items: center; justify-content: center; }
        .page.active { display: flex; }

        .liquid-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 380px;
        }

        h1 { font-size: 1.4rem; text-align: center; margin-bottom: 20px; font-weight: 300; letter-spacing: 2px; }

        .f-input {
            width: 100%; padding: 14px; margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; color: #fff; font-size: 15px; outline: none;
        }

        .main-btn {
            background: #fff; color: #000; padding: 16px; border-radius: 18px;
            border: none; font-weight: bold; cursor: pointer; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        #toast { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 10px 25px; border-radius: 50px;
            font-weight: bold; transition: 0.5s; z-index: 200;
        }

        .dock {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(20,20,20,0.8); backdrop-filter: blur(15px);
            padding: 12px 40px; border-radius: 35px; display: flex; gap: 50px;
            border: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        .dock-item { font-size: 22px; color: rgba(255,255,255,0.3); cursor: pointer; }
        .dock-item.active { color: #fff; }

        .report-item {
            background: rgba(255,255,255,0.03); margin-bottom: 10px; padding: 15px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); position: relative;
        }
        .actions { position: absolute; top: 15px; right: 15px; display: flex; gap: 15px; }
        .actions i { font-size: 14px; cursor: pointer; }

        .total-v { font-size: 30px; text-align: center; margin: 10px 0; font-weight: 200; }
        .sig { font-size: 9px; opacity: 0.3; text-align: center; margin-top: 15px; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div id="toast">Operazione completata</div>

    <div id="p-auth" class="page active">
        <div class="liquid-card">
            <h1>ACCESSO</h1>
            <input type="email" id="email" class="f-input" placeholder="Email">
            <input type="password" id="pass" class="f-input" placeholder="Password">
            <button class="main-btn" onclick="handleAuth('login')">LOGIN</button>
            <button class="main-btn" style="background:transparent; color:#fff; border:1px solid #333; margin-top:10px" onclick="handleAuth('signup')">REGISTRATI</button>
        </div>
        <div class="sig">SHOUKIR ABDALLA MASTER v29</div>
    </div>

    <div id="p-add" class="page">
        <div class="liquid-card">
            <h1 id="f-title">NUOVO LOG</h1>
            <input type="text" id="u-name" class="f-input" placeholder="Il tuo nome">
            <input type="text" id="u-comp" class="f-input" placeholder="Ditta">
            <input type="date" id="w-date" class="f-input">
            <input type="text" id="w-loc" class="f-input" placeholder="Cantiere/Luogo">
            <input type="number" step="0.5" id="w-hrs" class="f-input" placeholder="Ore lavorate">
            <textarea id="w-note" class="f-input" placeholder="Note (Arabo ok)" rows="2"></textarea>
            <button class="main-btn" onclick="saveWork()">SALVA ✅</button>
            <button id="cancel-btn" class="main-btn" style="display:none; background:red; color:#fff; margin-top:10px" onclick="resetForm()">ANNULLA</button>
        </div>
        <div class="sig">SHOUKIR ABDALLA MASTER v29</div>
    </div>

    <div id="p-rep" class="page" style="justify-content: flex-start; padding-top: 70px;">
        <div class="liquid-card" style="display:flex; flex-direction:column; max-height: 80vh;">
            <h1>ARCHIVIO</h1>
            <input type="month" id="month-filter" class="f-input" onchange="loadLogs()">
            <div id="logs-list" style="flex:1; overflow-y: auto;"></div>
            <div class="total-v" id="total-val">0.0</div>
            <button class="main-btn" onclick="buildNewPDF()">EXPORT PDF <i class="fas fa-file-pdf"></i></button>
        </div>
        <div class="sig">SHOUKIR ABDALLA MASTER v29</div>
    </div>

    <nav id="nav-bar" class="dock" style="display:none;">
        <div class="dock-item active" id="t-add" onclick="switchTab('add')"><i class="fas fa-plus"></i></div>
        <div class="dock-item" id="t-rep" onclick="switchTab('rep')"><i class="fas fa-file-alt"></i></div>
        <div class="dock-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i></div>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I", authDomain: "workapp-d34e0.firebaseapp.com", projectId: "workapp-d34e0", storageBucket: "workapp-d34e0.firebasestorage.app", messagingSenderId: "687874876802", appId: "1:687874876802:web:06e2e4e6030233cd579b9b" };
    const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

    let editId = null;
    let cached = [];

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            switchTab('add'); document.getElementById('p-auth').classList.remove('active');
            document.getElementById('nav-bar').style.display = 'flex';
            const u = await getDoc(doc(db, "users", user.uid));
            if(u.exists()) { 
                document.getElementById('u-name').value = u.data().fullname || ""; 
                document.getElementById('u-comp').value = u.data().company || ""; 
            }
            loadLogs();
        } else { document.getElementById('p-auth').classList.add('active'); document.getElementById('nav-bar').style.display = 'none'; }
    });

    window.showToast = (m) => { const t = document.getElementById('toast'); t.innerText = m; t.style.top = "30px"; setTimeout(() => t.style.top = "-100px", 2500); };

    window.handleAuth = async (type) => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try {
            if(type === 'login') await signInWithEmailAndPassword(auth, e, p);
            else { const r = await createUserWithEmailAndPassword(auth, e, p); await setDoc(doc(db, "users", r.user.uid), {fullname:"", company:""}); showToast("Creato!"); }
        } catch(e) { showToast("Errore Accesso"); }
    };

    window.logout = () => signOut(auth);

    window.saveWork = async () => {
        const d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!d || !h) return showToast("Dati mancanti");
        const id = editId || `${auth.currentUser.uid}_${d}`;
        await setDoc(doc(db, "workLogs", id), { 
            uid: auth.currentUser.uid, date: d, hours: parseFloat(h), 
            location: document.getElementById('w-loc').value, 
            note: document.getElementById('w-note').value, 
            month: d.slice(0,7)
        }, {merge:true});
        showToast("Successo! ✅"); resetForm(); switchTab('rep');
    };

    window.resetForm = () => { editId = null; document.getElementById('f-title').innerText = "NUOVO LOG"; document.getElementById('cancel-btn').style.display = 'none'; document.querySelectorAll('.f-input').forEach((i,idx) => { if(idx>1) i.value="" }); };

    window.editLog = (id, d, l, n, h) => {
        editId = id; switchTab('add'); document.getElementById('f-title').innerText = "MODIFICA";
        document.getElementById('cancel-btn').style.display = 'block';
        document.getElementById('w-date').value = d; document.getElementById('w-loc').value = l;
        document.getElementById('w-note').value = n; document.getElementById('w-hrs').value = h;
    };

    window.del = async (id) => { if(confirm("Eliminare?")) await deleteDoc(doc(db, "workLogs", id)); };

    window.loadLogs = () => {
        const m = document.getElementById('month-filter').value || new Date().toISOString().slice(0,7);
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), where("month", "==", m));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('logs-list'); list.innerHTML = ""; let tot = 0; cached = [];
            snap.forEach(d => {
                const data = d.data(); tot += data.hours; cached.push(data);
                list.innerHTML += `
                <div class="report-item">
                    <b>${data.date}</b> - ${data.hours}h
                    <div style="font-size:12px; opacity:0.6">${data.location}</div>
                    <div class="actions">
                        <i class="fas fa-edit" onclick="editLog('${d.id}','${data.date}','${data.location}','${data.note}','${data.hours}')"></i>
                        <i class="fas fa-trash" style="color:red" onclick="del('${d.id}')"></i>
                    </div>
                </div>`;
            });
            document.getElementById('total-val').innerText = tot.toFixed(1);
            cached.sort((a,b) => new Date(a.date) - new Date(b.date));
        });
    };

    // --- إعادة بناء الـ PDF من الصفر ---
    const fixAr = (t) => { if (!/[\u0600-\u06FF]/.test(t)) return t; return t.split(' ').map(w => w.split('').reverse().join('')).reverse().join('  '); };

    window.buildNewPDF = async () => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();
        const m = document.getElementById('month-filter').value;
        const name = document.getElementById('u-name').value;

        // رأس الصفحة
        pdf.setFontSize(20); pdf.text("RAPPORTO MENSILE", 105, 20, null, null, "center");
        pdf.setFontSize(12); pdf.text(`Dipendente: ${name}`, 15, 35);
        pdf.text(`Periodo: ${m}`, 15, 42);

        // تحضير البيانات
        const rows = cached.map(item => [
            item.date, 
            item.location || "-", 
            fixAr(item.note || "-"), 
            item.hours.toFixed(1)
        ]);

        // بناء الجدول الجديد
        pdf.autoTable({
            startY: 50,
            head: [['Data', 'Luogo', 'Note', 'Ore']],
            body: rows,
            headStyles: { fillColor: [0, 0, 0] },
            theme: 'grid'
        });

        const finalY = pdf.lastAutoTable.finalY || 150;
        pdf.text(`TOTALE: ${document.getElementById('total-val').innerText} ORE`, 15, finalY + 15);

        // تصدير
        const blob = pdf.output('blob');
        const file = new File([blob], `WorkReport_${m}.pdf`, { type: 'application/pdf' });
        if (navigator.share) await navigator.share({ files: [file] }); else pdf.save(`Report.pdf`);
    };

    window.switchTab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.dock-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-'+t).classList.add('active'); 
        document.getElementById('t-'+t).classList.add('active');
    };
</script>
</body>
</html>
