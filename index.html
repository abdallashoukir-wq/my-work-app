<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro - Advanced v5</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #00e676; --bg: #0d0d0d; --card: #1a1a1a; --text: #fff; --red: #ff5252; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; font-size: 18px; }
        
        .page { display: none; padding: 20px; min-height: 100vh; box-sizing: border-box; }
        .page.active { display: block; }

        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; max-width: 450px; margin: auto; }
        
        h3 { font-size: 24px; color: var(--primary); text-align: center; margin-bottom: 20px; }
        
        input, select { 
            width: 100%; padding: 16px; margin: 10px 0; background: #222; border: 2px solid #333; 
            color: #fff; border-radius: 12px; font-size: 18px; box-sizing: border-box; outline: none;
        }

        .btn { 
            background: var(--primary); color: #000; border: none; padding: 18px; width: 100%; 
            border-radius: 12px; font-weight: bold; font-size: 20px; margin-top: 10px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .btn-red { background: var(--red); color: white; margin-top: 5px; font-size: 16px; padding: 10px; }

        /* قائمة التقرير مع إمكانية الضغط */
        .item-row { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #333; background: #111; 
            margin-bottom: 8px; border-radius: 10px; font-size: 19px; 
        }
        .item-actions { display: flex; gap: 10px; }
        .icon-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; }

        .total-box { 
            text-align: center; padding: 20px; background: rgba(0,230,118,0.1); 
            border: 1px solid var(--primary); border-radius: 15px; margin-top: 20px;
        }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: none; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: #666; text-align: center; flex: 1; font-size: 16px; }
        .nav-item.active { color: var(--primary); }

        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="p-auth" class="page active">
    <div class="card" style="margin-top: 50px;">
        <h3>Welcome Back</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="authAction()">Login</button>
    </div>
</div>

<div id="p-add" class="page">
    <div class="header-bar">
        <span id="display-name" style="color:var(--primary); font-weight:bold;">Loading...</span>
        <button onclick="logout()" style="background:none; border:1px solid #444; color:#888; padding:5px 10px; border-radius:8px;">Logout</button>
    </div>
    <div class="card">
        <h3>Log Hours</h3>
        <input type="text" id="u-name" placeholder="Name">
        <input type="date" id="w-date">
        <input type="number" step="0.5" id="w-hrs" placeholder="Hours (e.g. 8.5)">
        <button class="btn" id="s-btn" onclick="saveData()">SAVE WORK ✅</button>
    </div>
</div>

<div id="p-rep" class="page" style="padding-bottom: 100px;">
    <div class="card">
        <h3>Monthly Report</h3>
        <label style="font-size:14px; color:#888;">Filter by Month:</label>
        <input type="month" id="month-filter" onchange="filterLogs()">
        
        <div id="list-container" style="margin-top:15px;"></div>
        
        <div class="total-box">
            <span style="font-size:18px;">Total Hours:</span><br>
            <b style="font-size:30px; color:var(--primary);" id="r-total">0.0</b>
        </div>
    </div>
    <button class="btn" style="background:#333; color:#fff; margin-top:20px;" onclick="sharePDF()">Share Report PDF</button>
</div>

<nav id="nav" class="nav">
    <div class="nav-item active" id="t-add" onclick="tab('add')"><i class="fas fa-plus"></i><br>Add</div>
    <div class="nav-item" id="t-rep" onclick="tab('rep')"><i class="fas fa-file-invoice"></i><br>Report</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ضبط الشهر الحالي تلقائياً في الفلتر
    document.getElementById('month-filter').value = new Date().toISOString().slice(0, 7);

    window.authAction = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch { try { await createUserWithEmailAndPassword(auth, e, p); } catch(err){ alert(err.message); } }
    };

    window.logout = () => { if(confirm("Logout?")) signOut(auth); };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-add').classList.add('active');
            document.getElementById('nav').style.display = 'flex';
            
            const uSnap = await getDoc(doc(db, "users", user.uid));
            if(uSnap.exists()) {
                const name = uSnap.data().fullname || "User";
                document.getElementById('u-name').value = name;
                document.getElementById('display-name').innerText = name;
            }
            filterLogs(); // تحميل البيانات
        } else {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-auth').classList.add('active');
            document.getElementById('nav').style.display = 'none';
        }
    });

    window.tab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-' + t).classList.add('active');
        document.getElementById('t-' + t).classList.add('active');
    };

    window.saveData = async () => {
        const n = document.getElementById('u-name').value, d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!n || !d || !h) return alert("Fill all fields!");
        const btn = document.getElementById('s-btn');
        btn.disabled = true;
        try {
            await setDoc(doc(db, "users", auth.currentUser.uid), { fullname: n }, { merge: true });
            const docId = `${auth.currentUser.uid}_${d}`; // حفظ برقم اليوم لسهولة التعديل
            await setDoc(doc(db, "workLogs", docId), {
                uid: auth.currentUser.uid,
                name: n, date: d, hours: parseFloat(h), month: d.slice(0, 7)
            });
            alert("Saved! ✅");
            tab('rep');
        } catch (e) { alert(e.message); }
        btn.disabled = false;
    };

    window.deleteLog = async (id) => {
        if(confirm("Delete this entry?")) {
            await deleteDoc(doc(db, "workLogs", id));
        }
    };

    window.editLog = (id, date, hrs) => {
        document.getElementById('w-date').value = date;
        document.getElementById('w-hrs').value = hrs;
        tab('add');
    };

    let pdfData = [];
    window.filterLogs = () => {
        const selectedMonth = document.getElementById('month-filter').value;
        const q = query(collection(db, "workLogs"), 
                  where("uid", "==", auth.currentUser.uid), 
                  where("month", "==", selectedMonth));

        onSnapshot(q, (snap) => {
            const list = document.getElementById('list-container');
            list.innerHTML = ""; pdfData = []; let total = 0;
            
            snap.forEach(d => {
                const data = d.data();
                total += data.hours;
                pdfData.push([data.date, data.hours.toFixed(1)]);
                list.innerHTML += `
                    <div class="item-row">
                        <div><b>${data.date}</b><br><small>${data.hours} hrs</small></div>
                        <div class="item-actions">
                            <button class="icon-btn" onclick="editLog('${d.id}', '${data.date}', ${data.hours})"><i class="fas fa-edit" style="color:#00e676"></i></button>
                            <button class="icon-btn" onclick="deleteLog('${d.id}')"><i class="fas fa-trash" style="color:#ff5252"></i></button>
                        </div>
                    </div>`;
            });
            document.getElementById('r-total').innerText = total.toFixed(1);
        });
    }

    window.sharePDF = async () => {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        const name = document.getElementById('display-name').innerText;
        const month = document.getElementById('month-filter').value;
        docPDF.text(`Work Report - ${month}`, 105, 20, null, null, "center");
        docPDF.text(`Employee: ${name}`, 20, 35);
        docPDF.autoTable({ startY: 40, head: [['Date', 'Hours']], body: pdfData });
        const pdfBlob = docPDF.output('blob');
        const file = new File([pdfBlob], 'Report.pdf', { type: 'application/pdf' });
        if(navigator.share) await navigator.share({ files: [file] }); else docPDF.save('Report.pdf');
    };
</script>
</body>
</html>
