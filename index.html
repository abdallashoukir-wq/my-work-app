<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro - Welcome v10</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #007bff; --bg: #000; --card: #1a1a1a; --text: #f5f5f5; --danger: #ff4444; }
        
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; font-size: 18px; overflow: hidden; }
        
        .page { display: none; padding: 20px; box-sizing: border-box; min-height: 100vh; position: relative; z-index: 10; }
        .page.active { display: block; }

        /* واجهة الدخول بدون إطار */
        .login-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; max-width: 400px; margin: auto; padding: 20px; }
        .input-group { width: 100%; margin: 10px 0; }
        input { width: 100%; padding: 18px; margin: 10px 0; background: rgba(34, 34, 34, 0.8); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 15px; font-size: 20px; box-sizing: border-box; outline: none; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 20px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 22px; margin-top: 15px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }

        .toggle-link { color: #888; margin-top: 20px; cursor: pointer; font-size: 16px; text-decoration: underline; }

        /* ساعة الخلفية بالأرقام */
        .clock-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 0; overflow: hidden; }
        .clock-face { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95vw; height: 95vw; max-width: 700px; max-height: 700px; border-radius: 50%; }
        
        .clock-number { position: absolute; width: 100%; height: 100%; text-align: center; font-size: 24px; font-weight: 300; color: rgba(255,255,255,0.9); padding: 15px; box-sizing: border-box; }
        
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; border-radius: 4px; }
        .hour { width: 8px; height: 25%; background: white; }
        .minute { width: 5px; height: 35%; background: white; }
        .second { width: 2px; height: 42%; background: #ff4444; }
        .center-dot { position: absolute; width: 12px; height: 12px; border-radius: 50%; background: #ff4444; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .welcome-badge { font-size: 45px; font-weight: 800; color: #fff; margin-bottom: 30px; text-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* تنسيق التقرير v6 المستقر */
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; max-width: 450px; margin: auto; }
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 420px; background: #000; display: none; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 1000; left: 0; right: 0; margin: 0 auto; }
        .nav-item { color: #666; text-align: center; flex: 1; font-size: 16px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="clock-bg">
        <div class="clock-face" id="clock-face">
            <div class="hand hour" id="hour-hand"></div>
            <div class="hand minute" id="min-hand"></div>
            <div class="hand second" id="sec-hand"></div>
            <div class="center-dot"></div>
        </div>
    </div>

    <div id="p-auth" class="page active">
        <div class="login-wrapper">
            <div class="welcome-badge">Welcome</div>
            <i class="fas fa-user-circle" style="font-size: 4rem; color: var(--primary); margin-bottom: 20px; opacity: 0.9;"></i>
            
            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address">
                <input type="password" id="pass" placeholder="Password">
            </div>
            
            <button class="btn" id="auth-btn" onclick="authAction()">Sign In <i class="fas fa-sign-in-alt"></i></button>
            <div class="toggle-link" id="toggle-auth" onclick="toggleAuthMode()">Don't have an account? Create one</div>
        </div>
    </div>

    <div id="p-add" class="page" style="overflow-y: auto;">
        <div class="card" style="margin-top: 40px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0; color:var(--primary);">Log Work Time</h3>
                <button onclick="logout()" style="background:none; border:1px solid #444; color:#888; padding:5px 10px; border-radius:8px;">Logout</button>
            </div>
            <input type="text" id="u-name" placeholder="Full Name">
            <input type="text" id="u-comp" placeholder="Company Name">
            <hr style="border:0; border-top:1px solid #333; margin:15px 0">
            <input type="date" id="w-date">
            <input type="number" step="0.5" id="w-hrs" placeholder="Hours Worked">
            <textarea id="w-note" placeholder="Notes (Optional)" rows="2"></textarea>
            <button class="btn" id="s-btn" onclick="saveData()">SAVE WORK ✅</button>
        </div>
    </div>

    <div id="p-rep" class="page" style="padding-bottom: 120px; overflow-y: auto;">
        <div class="card" style="margin-top: 40px;">
            <h3>Time Summary</h3>
            <label>Month Filter:</label>
            <input type="month" id="month-filter" onchange="filterLogs()">
            <div id="list-container"></div>
            <div style="text-align:center; padding:20px; background:rgba(0,123,255,0.1); border-radius:15px; margin-top:20px;">
                <span>TOTAL HOURS:</span><br>
                <b style="font-size:40px; color:var(--primary);" id="r-total">0.0</b>
            </div>
        </div>
        <button class="btn" onclick="handleiOSSharePDF()">Export PDF <i class="fas fa-share-alt"></i></button>
    </div>

    <nav id="nav" class="nav">
        <div class="nav-item active" id="t-add" onclick="tab('add')"><i class="fas fa-plus"></i><br>Add</div>
        <div class="nav-item" id="t-rep" onclick="tab('rep')"><i class="fas fa-file-invoice"></i><br>Report</div>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isSignUpMode = false;

    // ✅ وضع الأرقام في الساعة
    function setupClockNumbers() {
        const face = document.getElementById('clock-face');
        for (let i = 1; i <= 12; i++) {
            const num = document.createElement('div');
            num.className = 'clock-number';
            num.style.transform = `rotate(${i * 30}deg)`;
            num.innerHTML = `<span style="display:inline-block; transform:rotate(-${i * 30}deg)">${i}</span>`;
            face.appendChild(num);
        }
    }

    function updateClock() {
        const now = new Date();
        const sec = now.getSeconds(), min = now.getMinutes(), hr = now.getHours();
        document.getElementById('sec-hand').style.transform = `rotate(${sec * 6}deg)`;
        document.getElementById('min-hand').style.transform = `rotate(${min * 6 + sec * 0.1}deg)`;
        document.getElementById('hour-hand').style.transform = `rotate(${hr * 30 + min * 0.5}deg)`;
    }

    setupClockNumbers();
    setInterval(updateClock, 1000);
    updateClock();

    window.toggleAuthMode = () => {
        isSignUpMode = !isSignUpMode;
        document.getElementById('auth-btn').innerHTML = isSignUpMode ? 'Create Account <i class="fas fa-user-plus"></i>' : 'Sign In <i class="fas fa-sign-in-alt"></i>';
        document.getElementById('toggle-auth').innerText = isSignUpMode ? 'Already have an account? Sign In' : "Don't have an account? Create one";
    };

    window.authAction = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(!e || !p) return alert("Enter email and password");
        try {
            if(isSignUpMode) await createUserWithEmailAndPassword(auth, e, p);
            else await signInWithEmailAndPassword(auth, e, p);
        } catch(err) { alert(err.message); }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-add').classList.add('active');
            document.getElementById('nav').style.display = 'flex';
            document.querySelector('.clock-bg').style.display = 'none';
            const uSnap = await getDoc(doc(db, "users", user.uid));
            if(uSnap.exists()){
                document.getElementById('u-name').value = uSnap.data().fullname || "";
                document.getElementById('u-comp').value = uSnap.data().company || "";
            }
            filterLogs();
        } else {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-auth').classList.add('active');
            document.getElementById('nav').style.display = 'none';
            document.querySelector('.clock-bg').style.display = 'block';
        }
    });

    window.tab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-' + t).classList.add('active');
        document.getElementById('t-' + t).classList.add('active');
    };

    window.saveData = async () => {
        const n = document.getElementById('u-name').value, c = document.getElementById('u-comp').value, d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!n || !d || !h) return alert("Fill Name, Date and Hours!");
        try {
            await setDoc(doc(db, "users", auth.currentUser.uid), { fullname: n, company: c }, { merge: true });
            await setDoc(doc(db, "workLogs", `${auth.currentUser.uid}_${d}`), {
                uid: auth.currentUser.uid, fullname: n, company: c, date: d, hours: parseFloat(h), note: document.getElementById('w-note').value, month: d.slice(0, 7)
            });
            alert("Saved! ✅"); tab('rep');
        } catch (e) { alert(e.message); }
    };

    window.deleteLog = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "workLogs", id)); };

    window.filterLogs = () => {
        const month = document.getElementById('month-filter').value || new Date().toISOString().slice(0, 7);
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), where("month", "==", month));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('list-container'); list.innerHTML = ""; let total = 0;
            snap.forEach(d => {
                const data = d.data(); total += data.hours;
                list.innerHTML += `<div class="item-row"><div><b>${data.date}</b><br>${data.hours} hrs</div><button onclick="deleteLog('${d.id}')" style="background:none; border:none; color:red; font-size:20px;"><i class="fas fa-trash"></i></button></div>`;
            });
            document.getElementById('r-total').innerText = total.toFixed(1);
        });
    };

    window.handleiOSSharePDF = async () => {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        docPDF.text("Work Report", 20, 20);
        docPDF.save("Report.pdf");
    };
</script>
</body>
</html>
