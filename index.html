<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #00e676; --bg: #0d0d0d; --card: #1a1a1a; --text: #f5f5f5; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .app-container { width: 100%; max-width: 420px; margin: 0 auto; padding: 20px; box-sizing: border-box; padding-bottom: 80px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #2a2a2a; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #252525; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { background: var(--primary); color: #000; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        /* التحكم في الظهور */
        #auth-section { display: block; }
        #main-app { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* المنيو السفلية */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: #888; text-align: center; flex: 1; cursor: pointer; font-size: 0.8rem; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 4px; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; }
        td, th { padding: 10px; border-bottom: 1px solid #222; text-align: center; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 2000; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay"><i class="fas fa-circle-notch fa-spin style="font-size:3rem; color:var(--primary)"></i></div>

<div class="app-container">
    <div id="auth-section" class="card">
        <h2 style="text-align:center">تسجيل الدخول</h2>
        <input type="email" id="email" placeholder="الإيميل">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="btn" onclick="handleAuth()">دخول</button>
        <p onclick="toggleMode()" id="mode-text" style="text-align:center; color:var(--primary); cursor:pointer; margin-top:15px;">إنشاء حساب جديد؟</p>
    </div>

    <div id="main-app">
        <div id="name-setup" class="card" style="display:none; border: 2px solid var(--primary);">
            <h3>يرجى إدخال اسمك للتقارير</h3>
            <input type="text" id="fullname-input" placeholder="الاسم الكامل">
            <button class="btn" onclick="saveUserName()">حفظ الاسم</button>
        </div>

        <div id="add-tab" class="tab-content active">
            <div class="card">
                <h3>إضافة ساعات عمل</h3>
                <input type="date" id="work-date">
                <input type="number" id="work-hours" placeholder="عدد الساعات">
                <textarea id="work-note" placeholder="ملاحظة..."></textarea>
                <button class="btn" onclick="addEntry()">حفظ العمل +</button>
            </div>
        </div>

        <div id="report-tab" class="tab-content">
            <div class="card" id="pdf-area">
                <h3 id="report-name" style="text-align:center; color:var(--primary)">تقرير ساعات العمل</h3>
                <table id="work-table">
                    <thead><tr><th>التاريخ</th><th>ساعة</th><th>ملاحظة</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <button class="btn" style="background:#333; color:white;" onclick="exportPDF()">تحميل PDF</button>
        </div>

        <button onclick="logout()" style="background:none; border:none; color:red; width:100%; margin-top:10px; cursor:pointer">تسجيل خروج</button>

        <div class="bottom-nav">
            <div class="nav-item active" id="nav-add" onclick="switchTab('add')"><i class="fas fa-plus"></i>إضافة</div>
            <div class="nav-item" id="nav-report" onclick="switchTab('report')"><i class="fas fa-file-alt"></i>التقرير</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let loginMode = true;

    window.toggleMode = () => {
        loginMode = !loginMode;
        document.getElementById('mode-text').innerText = loginMode ? "إنشاء حساب جديد؟" : "لديك حساب؟ سجل دخول";
    };

    window.handleAuth = async () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try {
            if(loginMode) await signInWithEmailAndPassword(auth, e, p);
            else await createUserWithEmailAndPassword(auth, e, p);
        } catch (err) { alert(err.message); }
    };

    onAuthStateChanged(auth, async (user) => {
        document.getElementById('loading').style.display = 'none';
        if(user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            checkUserName(user.uid);
        } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    async function checkUserName(uid) {
        const d = await getDoc(doc(db, "users", uid));
        if(d.exists()) {
            document.getElementById('report-name').innerText = "تقرير: " + d.data().fullname;
            document.getElementById('name-setup').style.display = 'none';
        } else {
            document.getElementById('name-setup').style.display = 'block';
        }
    }

    window.saveUserName = async () => {
        const name = document.getElementById('fullname-input').value;
        if(!name) return;
        await setDoc(doc(db, "users", auth.currentUser.uid), { fullname: name });
        document.getElementById('name-setup').style.display = 'none';
        document.getElementById('report-name').innerText = "تقرير: " + name;
    };

    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(tab === 'add') {
            document.getElementById('add-tab').classList.add('active');
            document.getElementById('nav-add').classList.add('active');
        } else {
            document.getElementById('report-tab').classList.add('active');
            document.getElementById('nav-report').classList.add('active');
            loadData();
        }
    };

    window.addEntry = async () => {
        const date = document.getElementById('work-date').value;
        const hours = document.getElementById('work-hours').value;
        const note = document.getElementById('work-note').value;
        if(!date || !hours) return alert("أكمل البيانات");
        await addDoc(collection(db, "workLogs"), { uid: auth.currentUser.uid, date, hours, note, ts: new Date() });
        alert("تم الحفظ ✅");
        switchTab('report');
    };

    async function loadData() {
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), orderBy("date", "desc"));
        const snap = await getDocs(q);
        const tbody = document.querySelector('#work-table tbody');
        tbody.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            tbody.innerHTML += `<tr><td>${data.date}</td><td>${data.hours}</td><td>${data.note}</td></tr>`;
        });
    }

    window.logout = () => signOut(auth);
    window.exportPDF = () => html2pdf().from(document.getElementById('pdf-area')).save();
</script>
</body>
</html>
