<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro v16 - Multi-Lang</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --glow: rgba(255, 255, 255, 0.4); }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: #fff; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* ✨ خلفية v8 الأصلية (أشعة الضوء) */
        .v8-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1; overflow: hidden; }
        .ray { position: absolute; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1), transparent); width: 2px; height: 100vh; animation: moveRay 10s infinite linear; }
        @keyframes moveRay { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

        .page { display: none; padding: 20px; min-height: 100vh; box-sizing: border-box; position: relative; z-index: 5; }
        .page.active { display: block; }
        
        .card { background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); margin-top: 10px; }
        input, textarea, select { width: 100%; padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; font-size: 16px; box-sizing: border-box; }
        
        .btn { background: #fff; color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 0 15px var(--glow); }
        
        /* Lang Switcher */
        .top-bar { position: relative; z-index: 10; display: flex; justify-content: flex-end; padding: 10px 20px; gap: 10px; }
        .lang-select { width: auto; padding: 5px 10px; margin: 0; font-size: 12px; background: rgba(255,255,255,0.1); }

        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-item { color: #555; text-align: center; flex: 1; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #fff; text-shadow: 0 0 10px #fff; }

        .signature-bottom { text-align: center; font-weight: bold; color: #fff; font-size: 20px; margin: 30px 0; text-transform: uppercase; text-shadow: 0 0 15px #fff; }
        
        /* RTL Support for Arabic */
        .rtl { direction: rtl; text-align: right; }
    </style>
</head>
<body class="lang-en">

    <div class="v8-bg">
        <div class="ray" style="left:15%; animation-delay: 0s;"></div>
        <div class="ray" style="left:45%; animation-delay: 2s;"></div>
        <div class="ray" style="left:80%; animation-delay: 5s;"></div>
    </div>

    <div class="top-bar">
        <select class="lang-select" id="lang-changer" onchange="changeLang(this.value)">
            <option value="en">English 🇬🇧</option>
            <option value="it">Italiano 🇮🇹</option>
            <option value="ar">العربية 🇪🇬</option>
        </select>
        <button onclick="logout()" style="background:none; border:none; color:#777; cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
    </div>

    <div id="p-auth" class="page active">
        <div style="max-width:380px; margin: 80px auto; text-align:center;">
            <h1 id="txt-app-name" style="font-size:40px; text-shadow: 0 0 20px #fff; font-weight:200;">WORKTIME</h1>
            <div class="card">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Password">
                <button class="btn" id="btn-login" onclick="handleAuth()">LOGIN</button>
            </div>
            <div class="signature-bottom">Created by Shoukir Abdalla</div>
        </div>
    </div>

    <div id="p-add" class="page">
        <div class="card">
            <h2 id="txt-add-title">Log Work</h2>
            <input type="text" id="u-name" placeholder="Name">
            <input type="text" id="u-comp" placeholder="Company">
            <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
            <input type="date" id="w-date">
            <input type="text" id="w-loc-name" placeholder="Location">
            <input type="number" step="0.5" id="w-hrs" placeholder="Hours">
            <textarea id="w-note" placeholder="Notes"></textarea>
            <button class="btn" id="btn-save" onclick="saveWork()">SAVE SESSION ✅</button>
        </div>
        <div class="signature-bottom">Created by Shoukir Abdalla</div>
    </div>

    <div id="p-rep" class="page" style="padding-bottom: 120px;">
        <div class="card">
            <h3 id="txt-rep-title">Monthly Report</h3>
            <input type="month" id="month-filter" onchange="loadLogs()">
            <div id="logs-list"></div>
            <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:20px; text-align:center; margin-top:20px; border:1px solid #222;">
                <span id="txt-total-label">TOTAL HOURS</span><br>
                <b id="total-val" style="font-size:50px; text-shadow: 0 0 15px #fff;">0.0</b>
            </div>
            <button class="btn" id="btn-pdf" onclick="generateAndSharePDF()">SHARE PDF <i class="fas fa-file-pdf"></i></button>
        </div>
        <div class="signature-bottom">Created by Shoukir Abdalla</div>
    </div>

    <nav id="nav-bar" class="nav">
        <div class="nav-item active" id="t-add" onclick="switchTab('add')"><i class="fas fa-plus"></i><br><span id="nav-add">Add</span></div>
        <div class="nav-item" id="t-rep" onclick="switchTab('rep')"><i class="fas fa-file-alt"></i><br><span id="nav-rep">Report</span></div>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlUrDFR15XgZdYKcPN9IjLqCc0DmTJ37I",
      authDomain: "workapp-d34e0.firebaseapp.com",
      projectId: "workapp-d34e0",
      storageBucket: "workapp-d34e0.firebasestorage.app",
      messagingSenderId: "687874876802",
      appId: "1:687874876802:web:06e2e4e6030233cd579b9b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const translations = {
        en: { addTitle: "Log Work", save: "SAVE SESSION", repTitle: "Monthly Report", total: "TOTAL HOURS", navAdd: "Add", navRep: "Report", loc: "Location", hrs: "Hours", note: "Notes", login: "LOGIN", name: "Name", comp: "Company", months: ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"] },
        it: { addTitle: "Registra Ore", save: "SALVA SESSIONE", repTitle: "Riepilogo Mensile", total: "TOTALE ORE", navAdd: "Aggiungi", navRep: "Rapporto", loc: "Luogo", hrs: "Ore", note: "Note", login: "ACCEDI", name: "Nome", comp: "Azienda", months: ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"] },
        ar: { addTitle: "تسجيل العمل", save: "حفظ الجلسة", repTitle: "التقرير الشهري", total: "إجمالي الساعات", navAdd: "إضافة", navRep: "التقرير", loc: "الموقع", hrs: "الساعات", note: "ملاحظات", login: "دخول", name: "الاسم", comp: "الشركة", months: ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"] }
    };

    let currentLang = 'en';
    window.changeLang = (lang) => {
        currentLang = lang;
        const t = translations[lang];
        document.body.className = lang === 'ar' ? 'rtl' : '';
        document.getElementById('txt-add-title').innerText = t.addTitle;
        document.getElementById('btn-save').innerText = t.save;
        document.getElementById('txt-rep-title').innerText = t.repTitle;
        document.getElementById('txt-total-label').innerText = t.total;
        document.getElementById('nav-add').innerText = t.navAdd;
        document.getElementById('nav-rep').innerText = t.navRep;
        document.getElementById('u-name').placeholder = t.name;
        document.getElementById('u-comp').placeholder = t.comp;
        document.getElementById('w-loc-name').placeholder = t.loc;
        document.getElementById('w-hrs').placeholder = t.hrs;
        document.getElementById('w-note').placeholder = t.note;
        document.getElementById('btn-login').innerText = t.login;
        loadLogs();
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            switchTab('add');
            document.getElementById('p-auth').classList.remove('active');
            document.getElementById('nav-bar').style.display = 'flex';
            const u = await getDoc(doc(db, "users", user.uid));
            if(u.exists()) {
                document.getElementById('u-name').value = u.data().fullname || "";
                document.getElementById('u-comp').value = u.data().company || "";
            }
            loadLogs();
        } else {
            document.getElementById('p-auth').classList.add('active');
            document.getElementById('nav-bar').style.display = 'none';
        }
    });

    window.handleAuth = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert("Error"); }
    };

    window.logout = () => signOut(auth);

    window.saveWork = async () => {
        const d = document.getElementById('w-date').value, h = document.getElementById('w-hrs').value;
        if(!d || !h) return alert("Fill data");
        await setDoc(doc(db, "workLogs", `${auth.currentUser.uid}_${d}`), { 
            uid: auth.currentUser.uid, date: d, hours: parseFloat(h), 
            locationName: document.getElementById('w-loc-name').value, 
            note: document.getElementById('w-note').value, month: d.slice(0, 7) 
        }, {merge: true});
        alert("Saved! ✅"); switchTab('rep');
    };

    window.deleteEntry = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "workLogs", id)); };

    let cachedLogs = [];
    window.loadLogs = () => {
        const m = document.getElementById('month-filter').value || new Date().toISOString().slice(0, 7);
        const q = query(collection(db, "workLogs"), where("uid", "==", auth.currentUser.uid), where("month", "==", m));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('logs-list'); list.innerHTML = ""; let tot = 0; cachedLogs = [];
            snap.forEach(d => {
                const data = d.data(); tot += data.hours;
                cachedLogs.push([data.date, data.locationName, data.note, data.hours.toFixed(1)]);
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #222;">
                    <div><b>${data.date}</b><br><small>${data.locationName}</small></div>
                    <div><b>${data.hours}h</b> <i class="fas fa-trash" style="color:red; margin-left:10px;" onclick="deleteEntry('${d.id}')"></i></div>
                </div>`;
            });
            document.getElementById('total-val').innerText = tot.toFixed(1);
            cachedLogs.sort((a,b) => new Date(a[0]) - new Date(b[0]));
        });
    };

    window.generateAndSharePDF = async () => {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        const mVal = document.getElementById('month-filter').value || "2026-01";
        const monthIndex = parseInt(mVal.split('-')[1]) - 1;
        const monthName = translations[currentLang].months[monthIndex];
        
        docPDF.setFillColor(0, 123, 255); docPDF.rect(0, 0, 210, 45, 'F');
        docPDF.setTextColor(255, 255, 255); 
        docPDF.setFontSize(26); docPDF.text(monthName.toUpperCase() + " " + mVal.split('-')[0], 105, 25, null, null, "center");
        
        docPDF.setTextColor(0, 0, 0); docPDF.setFontSize(16);
        docPDF.text(`${translations[currentLang].name.toUpperCase()}: ${document.getElementById('u-name').value.toUpperCase()}`, 15, 60);
        docPDF.text(`${translations[currentLang].comp.toUpperCase()}: ${document.getElementById('u-comp').value.toUpperCase()}`, 15, 70);

        docPDF.autoTable({
            startY: 80,
            head: [[translations[currentLang].navAdd, translations[currentLang].loc, translations[currentLang].note, translations[currentLang].hrs]],
            body: cachedLogs,
            theme: 'grid',
            headStyles: { fillColor: [0, 123, 255] }
        });

        const finalY = docPDF.lastAutoTable.finalY + 20;
        docPDF.setFontSize(22); docPDF.setTextColor(0, 123, 255);
        docPDF.text(`${translations[currentLang].total}: ${document.getElementById('total-val').innerText} HRS`, 200, finalY, null, null, "right");
        
        docPDF.setFontSize(16); docPDF.setTextColor(150, 150, 150);
        docPDF.text("Created by Shoukir Abdalla", 105, 285, null, null, "center");

        const blob = docPDF.output('blob');
        const file = new File([blob], `Report.pdf`, { type: "application/pdf" });
        if (navigator.share) await navigator.share({ files: [file] });
        else docPDF.save(`Report.pdf`);
    };

    window.switchTab = (t) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-'+t).classList.add('active');
        document.getElementById('t-'+t).classList.add('active');
    };
</script>
</body>
</html>
